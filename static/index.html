function SystemTab({ adminToken, onSaved }) {
  const [basePrompt,  setBasePrompt]  = useState('');
  const [rules,       setRules]       = useState([]);   // array of strings
  const [newRule,     setNewRule]     = useState('');
  const [baseOpen,    setBaseOpen]    = useState(false);
  const [manualMode,  setManualMode]  = useState(false);
  const [manualDraft, setManualDraft] = useState('');
  const [loading,     setLoading]     = useState(true);
  const [saving,      setSaving]      = useState(false);
  const [err,         setErr]         = useState('');
  // Modelo
  const newRuleRef = useRef(null);

  function parseRules(text) {
    return (text || '').split('\n').map(l => l.trim()).filter(l => l);
  }

  useEffect(() => {
    fetch('/api/admin/system-prompt', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => {
        setBasePrompt(d.base_prompt || '');
        setRules(parseRules(d.custom_prompt));
        setManualDraft(d.custom_prompt || '');
        setLoading(false);
      })
      .catch(() => { setErr('Error al cargar la configuración.'); setLoading(false); });
  }, [adminToken]);

  async function persistRules(updatedRules, toastMsg) {
    setSaving(true); setErr('');
    const customPrompt = updatedRules.join('\n');
    try {
      const r = await fetch('/api/admin/system-prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ custom_prompt: customPrompt }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      setRules(updatedRules);
      setManualDraft(customPrompt);
      onSaved(toastMsg || '✓ Reglas actualizadas');
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function addRule() {
    const t = newRule.trim();
    if (!t) return;
    await persistRules([...rules, t], `✓ Regla añadida (${rules.length + 1} en total)`);
    setNewRule('');
    newRuleRef.current?.focus();
  }

  async function deleteRule(idx) {
    const updated = rules.filter((_, i) => i !== idx);
    await persistRules(updated, '✓ Regla eliminada');
  }

  async function clearAll() {
    if (!confirm('¿Eliminar todas las reglas personalizadas? El agente volverá a su comportamiento base.')) return;
    await persistRules([], '✓ Personalización borrada');
  }

  async function saveManual() {
    const updated = parseRules(manualDraft);
    await persistRules(updated, '✓ Configuración guardada');
  }

  function handleNewKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addRule(); }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  return (
    <div className="tab-pane">
      {/* Base prompt — solo lectura */}
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>Prompt del sistema (base)</span>
          <span className="prompt-block-badge badge-base">Solo lectura</span>
        </div>
        <div className="prompt-block">
          <div className="prompt-block-header" onClick={() => setBaseOpen(v => !v)}>
            <span className="prompt-block-title">{baseOpen ? 'Ocultar contenido' : 'Ver prompt base completo'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{baseOpen ? '▲' : '▼'}</span>
          </div>
          {baseOpen && <div className="prompt-block-body">{basePrompt}</div>}
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6 }}>
          Define la identidad e instrucciones base del agente. No editable.
        </div>
      </div>

      {/* Reglas personalizadas */}
      <div>
        <div className="rules-header">
          <span className="rules-title">Reglas personalizadas activas</span>
          <span className="rules-count">{rules.length === 0 ? 'Ninguna activa' : `${rules.length} regla${rules.length !== 1 ? 's' : ''} aplicada${rules.length !== 1 ? 's' : ''}`}</span>
          {rules.length > 0 && (
            <button className="btn-danger" style={{ marginLeft: 'auto', padding: '5px 12px', fontSize: 11 }} onClick={clearAll} disabled={saving}>
              Borrar todas
            </button>
          )}
        </div>

        {!manualMode ? (
          <>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {rules.length === 0 ? (
                <div className="rule-empty">
                  📝 No hay reglas personalizadas todavía. Agregá una abajo para modificar el comportamiento del agente.
                </div>
              ) : rules.map((rule, i) => (
                <div key={i} className="rule-card">
                  <div className="rule-number">{i + 1}</div>
                  <div className="rule-text">{rule}</div>
                  <button className="rule-delete" onClick={() => deleteRule(i)} disabled={saving} title="Eliminar regla">×</button>
                </div>
              ))}
            </div>

            <div className="rule-input-wrap">
              <textarea
                ref={newRuleRef}
                rows={2}
                placeholder='Nueva regla (ej: "Siempre priorizá BERMAD en válvulas de control" · "Respondé en inglés técnico"). Enter para añadir.'
                value={newRule}
                onChange={e => setNewRule(e.target.value)}
                onKeyDown={handleNewKeyDown}
                disabled={saving}
                onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
              />
              <button className="btn-add-rule" onClick={addRule} disabled={saving || !newRule.trim()}>
                {saving ? '…' : '+ Añadir'}
              </button>
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6 }}>
              Las reglas se guardan automáticamente al añadir. Aplican inmediatamente en la próxima consulta del agente.
            </div>
          </>
        ) : (
          <div className="custom-editor">
            <textarea
              value={manualDraft}
              onChange={e => setManualDraft(e.target.value)}
              placeholder="Una regla por línea. Líneas vacías se ignoran."
              rows={10}
            />
            <div className="custom-editor-footer">
              <span className="custom-editor-hint">
                Modo avanzado: una regla por línea. Cambios se aplican al guardar.
                {manualDraft.length > 0 && <span style={{ marginLeft: 8, color: 'var(--blue)' }}>{manualDraft.length} caracteres</span>}
              </span>
              <button className="btn-blue" style={{ padding: '7px 18px' }} onClick={saveManual} disabled={saving}>
                {saving ? 'Guardando…' : 'Guardar todo'}
              </button>
            </div>
          </div>
        )}

        <label className="mode-toggle">
          <input type="checkbox" checked={manualMode} onChange={e => setManualMode(e.target.checked)} />
          Modo avanzado (editar manualmente como texto)
        </label>

        {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}
      </div>
    </div>
  );
}

/* ── Memoria tab ── */
function MemoryTab({ adminToken, onSaved }) {
  const [mem,       setMem]      = useState(null);
  const [loading,   setLoading]  = useState(true);
  const [refreshing,setRefreshing] = useState(false);

  function fetchMemory() {
    setLoading(true);
    fetch('/api/admin/memory', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => setMem(d))
      .catch(() => setMem(null))
      .finally(() => setLoading(false));
  }

  useEffect(fetchMemory, [adminToken]);

  async function refresh() {
    setRefreshing(true);
    try {
      const r = await fetch('/api/admin/memory/refresh', { method: 'POST', headers: { Authorization: `Bearer ${adminToken}` } });
      const d = await r.json();
      setMem(d);
      if (d.content) onSaved('✓ Memoria actualizada');
      else if (d.error) onSaved('⚠️ ' + d.error);
    } catch { onSaved('⚠️ Error al generar memoria'); }
    finally { setRefreshing(false); }
  }

  const genDate = mem?.generated_at ? new Date(mem.generated_at).toLocaleString('es-UY') : null;

  return (
    <div className="tab-pane">
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexWrap: 'wrap' }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>Memoria de interacciones</div>
          <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
            Análisis automático de las conversaciones recientes. Se regenera cada 24 horas o manualmente.
          </div>
        </div>
        <button className="btn-blue" style={{ marginLeft: 'auto', whiteSpace: 'nowrap' }} onClick={refresh} disabled={refreshing || loading}>
          {refreshing ? 'Analizando…' : '↺ Actualizar ahora'}
        </button>
      </div>

      {loading ? (
        <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>Cargando…</div>
      ) : mem?.content ? (
        <>
          <div className="memory-meta">
            <div><div className="memory-meta-label">Generada</div><div className="memory-meta-value">{genDate}</div></div>
            <div style={{ width: 1, height: 32, background: 'var(--border)' }}></div>
            <div><div className="memory-meta-label">Conversaciones analizadas</div><div className="memory-meta-value">{mem.conversations_analyzed}</div></div>
          </div>
          <div className="memory-content">
            <div className="md-render" dangerouslySetInnerHTML={md(mem.content)} />
          </div>
        </>
      ) : (
        <div className="memory-content">
          <div className="memory-empty">
            <div className="memory-empty-icon">🧠</div>
            <div className="memory-empty-text">
              {mem?.error || 'No hay memoria generada aún. Las conversaciones se registran automáticamente y podés generar un análisis cuando quieras.'}
            </div>
            <button className="btn-blue" onClick={refresh} disabled={refreshing}>
              {refreshing ? 'Analizando…' : 'Generar memoria ahora'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Admin chat tab ── */
function AdminChatTab({ adminToken, onSaved }) {
  const [messages, setMessages] = useState([{
    role: 'assistant',
    content: '¡Hola, Bruno! Estoy en modo administrador. Podés preguntarme sobre mi configuración actual, pedirme que cambie mi comportamiento, o consultarme sobre la memoria de interacciones. ¿En qué te puedo ayudar?'
  }]);
  const [input,   setInput]   = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const textRef   = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  async function send(text) {
    text = (text || input).trim();
    if (!text || loading) return;
    const newMsgs = [...messages, { role: 'user', content: text }];
    setMessages(newMsgs); setInput(''); setLoading(true);

    let streamedText = '';
    let assistantAdded = false;

    try {
      const apiMsgs = newMsgs.filter(m => m.role !== 'system-event').map(m => ({ role: m.role, content: m.content }));
      const res = await fetch('/api/admin/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ messages: apiMsgs }),
      });
      if (!res.ok) { setMessages(p => [...p, { role: 'assistant', content: '⚠️ Error de conexión.' }]); return; }

      await readSSE(res, (evt) => {
        if (evt.type === 'behavior_saved') {
          setMessages(p => [...p, { role: 'system-event', content: `✓ Comportamiento guardado: "${evt.new_prompt.slice(0, 80)}${evt.new_prompt.length > 80 ? '…' : ''}"` }]);
          onSaved('✓ Comportamiento del agente actualizado');
        } else if (evt.type === 'text') {
          streamedText += evt.text;
          if (!assistantAdded) {
            assistantAdded = true;
            setMessages(p => [...p, { role: 'assistant', content: streamedText, streaming: true }]);
          } else {
            setMessages(p => {
              const u = [...p];
              const last = u[u.length - 1];
              if (last && last.role === 'assistant') {
                u[u.length - 1] = { ...last, content: streamedText, streaming: true };
              }
              return u;
            });
          }
        } else if (evt.type === 'done') {
          setMessages(p => {
            const u = [...p];
            const last = u[u.length - 1];
            if (last && last.role === 'assistant' && last.streaming) {
              u[u.length - 1] = { ...last, streaming: false };
            } else if (!assistantAdded) {
              u.push({ role: 'assistant', content: streamedText || 'Listo.' });
            }
            return u;
          });
        } else if (evt.type === 'error') {
          setMessages(p => [...p, { role: 'assistant', content: `⚠️ Error: ${evt.message}` }]);
        }
      });
    } catch {
      setMessages(p => [...p, { role: 'assistant', content: '⚠️ No se pudo conectar.' }]);
    } finally {
      setLoading(false); textRef.current?.focus();
    }
  }

  return (
    <div className="admin-chat-wrap">
      <div className="admin-chat-msgs">
        {messages.map((m, i) => {
          if (m.role === 'system-event') return (
            <div key={i} className="behavior-saved-banner">✓ {m.content}</div>
          );
          const isLast = i === messages.length - 1;
          const isStreaming = m.streaming && isLast;
          return (
            <div key={i} className={`admin-msg ${m.role}`}>
              <div className="admin-msg-role">{m.role === 'user' ? 'Bruno' : 'Agente'}</div>
              <div className="admin-msg-bubble">
                {m.role === 'assistant'
                  ? <>
                      <AssistantMd content={m.content} />
                      {isStreaming && <span className="streaming-cursor" />}
                    </>
                  : m.content
                }
              </div>
            </div>
          );
        })}
        {loading && !(messages[messages.length - 1]?.streaming) && (
          <div className="progress-bar" style={{ maxWidth: 320 }}>
            <span className="progress-bar-label">Procesando</span>
            <div className="progress-bar-track"><div className="progress-bar-fill" /></div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="admin-chat-input">
        <textarea
          ref={textRef}
          rows={2}
          placeholder="Escribile al agente… (ej: 'Quiero que siempre priorices BERMAD' · 'Contame qué sabés de tu configuración')"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={loading}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
        />
        <button className="btn-blue" onClick={() => send()} disabled={loading || !input.trim()} style={{ alignSelf: 'flex-end' }}>
          Enviar →
        </button>
      </div>
    </div>
  );
}

/* ── Usuarios tab ── */
function UsersTab({ adminToken, onSaved }) {
  const [users,       setUsers]       = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [newUser,     setNewUser]     = useState('');
  const [newPass,     setNewPass]     = useState('');
  const [creating,    setCreating]    = useState(false);
  const [createErr,   setCreateErr]   = useState('');
  const [viewingUser, setViewingUser] = useState(null);
  const [conversations, setConversations] = useState(null);
  const [convsLoading, setConvsLoading] = useState(false);

  function fetchUsers() {
    setLoading(true);
    fetch('/api/admin/users', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => setUsers(d.users || []))
      .catch(() => setUsers([]))
      .finally(() => setLoading(false));
  }

  useEffect(fetchUsers, [adminToken]);

  async function createUser(e) {
    e?.preventDefault?.();
    if (!newUser.trim() || !newPass.trim()) return;
    setCreating(true); setCreateErr('');
    try {
      const r = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ username: newUser.trim(), password: newPass }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al crear');
      setNewUser(''); setNewPass('');
      onSaved(`✓ Usuario "${newUser}" creado`);
      fetchUsers();
    } catch (e) { setCreateErr(e.message); }
    finally { setCreating(false); }
  }

  async function deleteUser(name) {
    if (!confirm(`¿Eliminar el usuario "${name}"? Esta acción no se puede deshacer.`)) return;
    try {
      const r = await fetch(`/api/admin/users/${encodeURIComponent(name)}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${adminToken}` },
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error');
      onSaved(`✓ Usuario "${name}" eliminado`);
      fetchUsers();
    } catch (e) { alert(e.message); }
  }

  async function viewConversations(name) {
    setViewingUser(name); setConvsLoading(true); setConversations(null);
    try {
      const r = await fetch(`/api/admin/conversations?user=${encodeURIComponent(name)}&limit=100`, {
        headers: { Authorization: `Bearer ${adminToken}` },
      });
      const d = await r.json();
      setConversations(d.conversations || []);
    } catch { setConversations([]); }
    finally { setConvsLoading(false); }
  }

  function fmtDate(iso) {
    if (!iso) return 'Nunca';
    try { return new Date(iso).toLocaleString('es-UY', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch { return iso; }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  return (
    <div className="tab-pane">
      {viewingUser && (
        <div className="modal-overlay" style={{ background: 'rgba(10,20,50,.6)', zIndex: 300 }} onClick={e => e.target === e.currentTarget && setViewingUser(null)}>
          <div className="modal-card" style={{ maxWidth: 720, maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}>
            <div className="modal-title">📋 Conversaciones de {viewingUser}</div>
            <div className="modal-subtitle">Últimas 100 interacciones registradas</div>
            <div style={{ flex: 1, overflowY: 'auto', marginTop: 8, padding: '4px 0' }}>
              {convsLoading ? (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>Cargando…</div>
              ) : !conversations || conversations.length === 0 ? (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
                  No hay conversaciones registradas para este usuario aún.
                </div>
              ) : (
                conversations.map((c, i) => (
                  <div key={i} style={{ padding: '10px 0', borderBottom: '1px solid var(--border-lt)' }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>{fmtDate(c.ts)}</div>
                    <div style={{ fontSize: 13, color: 'var(--blue)', marginBottom: 4 }}>
                      <strong>Pregunta:</strong> {c.user}
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.5 }}>
                      <strong>Respuesta:</strong> {(c.assistant || '').slice(0, 300)}{(c.assistant || '').length > 300 ? '…' : ''}
                    </div>
                  </div>
                ))
              )}
            </div>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setViewingUser(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}

      <div>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>Usuarios del sistema</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 16 }}>
          Cada usuario tiene su propia historia de conversaciones. Como admin podés crear, eliminar y ver el log de cada uno.
        </div>

        <form onSubmit={createUser} style={{ display: 'flex', gap: 8, marginBottom: 18, padding: 14, background: 'var(--surface2)', borderRadius: 10, border: '1px solid var(--border-lt)' }}>
          <input
            type="text"
            placeholder="Nombre de usuario (letras, números, _ . -)"
            value={newUser}
            onChange={e => setNewUser(e.target.value)}
            style={{ flex: 1, padding: '9px 12px', border: '1.5px solid var(--border)', borderRadius: 7, fontSize: 13, fontFamily: 'var(--sans)', outline: 'none' }}
            disabled={creating}
            pattern="[a-zA-Z0-9_.\-]+"
            required
          />
          <input
            type="text"
            placeholder="Contraseña (mín. 8 caracteres)"
            value={newPass}
            onChange={e => setNewPass(e.target.value)}
            style={{ width: 220, padding: '9px 12px', border: '1.5px solid var(--border)', borderRadius: 7, fontSize: 13, fontFamily: 'var(--sans)', outline: 'none' }}
            disabled={creating}
            minLength={8}
            required
          />
          <button type="submit" className="btn-blue" disabled={creating || !newUser.trim() || newPass.length < 8}>
            {creating ? '…' : '+ Crear'}
          </button>
        </form>
        {createErr && <div className="error-msg" style={{ marginTop: -10, marginBottom: 14, textAlign: 'left' }}>{createErr}</div>}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {users.length === 0 ? (
            <div className="rule-empty">📭 No hay usuarios. Creá uno arriba para empezar.</div>
          ) : users.map(u => (
            <div key={u.username} className="rule-card" style={{ alignItems: 'center' }}>
              <div className="rule-number" style={{ background: 'var(--blue)', color: '#fff' }}>👤</div>
              <div className="rule-text" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <div style={{ fontWeight: 700, color: 'var(--text)' }}>{u.username}</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  Creado: {fmtDate(u.created_at)} · Última actividad: {fmtDate(u.last_active)} · {u.conversation_count} conversación{u.conversation_count !== 1 ? 'es' : ''}
                </div>
              </div>
              <button className="btn-ghost" style={{ padding: '6px 12px', fontSize: 11 }} onClick={() => viewConversations(u.username)}>
                Ver historial
              </button>
              <button className="rule-delete" onClick={() => deleteUser(u.username)} title="Eliminar usuario">×</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Tab: Asistentes ── */
function AgentsTab({ adminToken, onSaved }) {
  const [agents, setAgents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editingId, setEditingId] = useState(null);
  const [promptDraft, setPromptDraft] = useState('');
  const [promptLoading, setPromptLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');

  function reload() {
    setLoading(true);
    fetch('/api/admin/agents', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json())
      .then(d => { setAgents(d.agents || []); setLoading(false); })
      .catch(() => { setErr('Error al cargar agentes'); setLoading(false); });
  }
  useEffect(() => { reload(); }, [adminToken]);

  function openEditor(agentId) {
    setEditingId(agentId);
    setPromptLoading(true);
    setPromptDraft('');
    setErr('');
    fetch(`/api/admin/agents/${agentId}/prompt`, { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => { setPromptDraft(d.content || ''); setPromptLoading(false); })
      .catch(() => { setErr('No se pudo cargar el prompt'); setPromptLoading(false); });
  }
  function closeEditor() { setEditingId(null); setPromptDraft(''); setErr(''); }

  async function savePrompt() {
    if (!editingId) return;
    setSaving(true); setErr('');
    try {
      const r = await fetch(`/api/admin/agents/${editingId}/prompt`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ content: promptDraft }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      onSaved(`✓ Prompt de "${agents.find(a => a.id === editingId)?.name || editingId}" guardado`);
      closeEditor();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  // Vista de edición de prompt
  if (editingId) {
    const agent = agents.find(a => a.id === editingId);
    return (
      <div className="tab-pane">
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <button className="btn-ghost" style={{ padding: '6px 12px', fontSize: 12 }} onClick={closeEditor}>← Volver</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)' }}>
              {agent?.icon} {agent?.name}
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
              Editando system prompt — <code>app/agents/definitions/{editingId}.md</code>
            </div>
          </div>
        </div>

        {promptLoading ? (
          <div className="rule-empty">Cargando prompt…</div>
        ) : (
          <>
            <textarea
              value={promptDraft}
              onChange={e => setPromptDraft(e.target.value)}
              rows={26}
              spellCheck={false}
              style={{
                width: '100%',
                padding: '12px 14px',
                border: '1.5px solid var(--border)',
                borderRadius: 8,
                fontFamily: 'ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace',
                fontSize: 12,
                lineHeight: 1.55,
                color: 'var(--text)',
                background: 'var(--surface)',
                outline: 'none',
                resize: 'vertical',
              }}
              placeholder="Escribe el system prompt del agente en markdown…"
            />
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
              <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                {promptDraft.length.toLocaleString()} caracteres. Se aplica inmediatamente sin reiniciar el servidor. Podés usar <code>{'{n_items}'}</code> para que se sustituya por el tamaño actual del catálogo.
              </span>
              <button className="btn-blue" style={{ marginLeft: 'auto', padding: '8px 18px' }} onClick={savePrompt} disabled={saving || !promptDraft.trim()}>
                {saving ? 'Guardando…' : 'Guardar cambios'}
              </button>
            </div>
            {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}
          </>
        )}
      </div>
    );
  }

  // Vista lista de agentes
  return (
    <div className="tab-pane">
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>Asistentes configurados</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
          Cada asistente tiene su propio system prompt, tools habilitadas y permisos.
          Editá el prompt para cambiar el comportamiento sin reiniciar el servidor.
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {agents.map(a => {
          const visBadge = a.visibility === 'public'
            ? { label: 'PÚBLICO', color: 'var(--success, #16a34a)' }
            : a.visibility === 'private'
              ? { label: 'PRIVADO', color: '#9333ea' }
              : { label: `${a.allowed_users.length} USERS`, color: 'var(--blue)' };
          const tierBadge = a.default_tier === 'auto'
            ? null
            : a.default_tier === 'pro'
              ? { label: '◆ PRO', color: '#7c3aed' }
              : a.default_tier === 'flash'
                ? { label: '● FLASH', color: 'var(--blue)' }
                : { label: '○ LITE', color: 'var(--text-muted)' };
          return (
            <div key={a.id} className="rule-card" style={{ alignItems: 'flex-start' }}>
              <div className="rule-number" style={{ fontSize: 18, background: 'transparent', border: '1px solid var(--border)' }}>
                {a.icon || '🤖'}
              </div>
              <div className="rule-text" style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>{a.name}</span>
                  {a.is_default && <span className="prompt-block-badge badge-active">DEFAULT</span>}
                  <span className="prompt-block-badge" style={{ background: visBadge.color, color: '#fff' }}>{visBadge.label}</span>
                  {tierBadge && <span className="prompt-block-badge" style={{ background: tierBadge.color, color: '#fff' }}>{tierBadge.label}</span>}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  <code style={{ background: 'none', padding: 0, fontSize: 10 }}>{a.id}</code>
                  {a.description && ` · ${a.description}`}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  Tools: {a.allowed_tools.length === 0 ? '(ninguna)' : a.allowed_tools.join(', ')}
                </div>
              </div>
              <button className="btn-blue" style={{ padding: '7px 14px', fontSize: 12 }} onClick={() => openEditor(a.id)}>
                Editar prompt
              </button>
            </div>
          );
        })}
      </div>

      <div style={{ marginTop: 16, padding: 12, border: '1px dashed var(--border)', borderRadius: 8, fontSize: 11, color: 'var(--text-muted)' }}>
        💡 La creación y eliminación de asistentes desde la UI llega en la próxima fase. Por ahora podés agregar nuevos editando <code>agents.json</code> manualmente.
      </div>
    </div>
  );
}

function Chat({ token, username, theme, onToggleTheme, onLogout }) {
  const [chats,         setChats]         = useState(() => loadChats(username));
  const [activeId,      setActiveId]      = useState(null);
  const [messages,      setMessages]      = useState([]);
  const [input,         setInput]         = useState('');
  const [loading,       setLoading]       = useState(false);
  const [thinkingSteps, setThinkingSteps] = useState([]);
  const [sidebarOpen,   setSidebarOpen]   = useState(() => typeof window !== 'undefined' ? window.innerWidth > 720 : true);
  const [sidebarQuery,  setSidebarQuery]  = useState('');
  const [feedback,      setFeedback]      = useState({}); // {msgIndex: 'up'|'down'}
  const [pendingImg,    setPendingImg]    = useState(null);
  const [pendingDocs,   setPendingDocs]   = useState([]); // [{filename, char_count, text}]
  const [uploadingDoc,  setUploadingDoc]  = useState(false);
  const [activeModel,   setActiveModel]   = useState(null); // {model, source}
  const [recording,     setRecording]     = useState(false);
  const [adminState,    setAdminState]    = useState(null); // null | 'login' | 'panel'
  const [adminToken,    setAdminToken]    = useState(getAdminTok);
  const [toast,         setToast]         = useState('');
  // ── Agentes ─────────────────────────────────────────────────────
  const [agents,         setAgents]         = useState([]);
  const [currentAgentId, setCurrentAgentId] = useState(() => {
    try { return localStorage.getItem(`demo_company_agent_${username}`) || null; } catch { return null; }
  });
  const [agentMenuOpen,  setAgentMenuOpen]  = useState(false);

  const bottomRef  = useRef(null);
  const textareaRef = useRef(null);
  const fileRef    = useRef(null);
  const docFileRef = useRef(null);
  const recogRef   = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading, thinkingSteps]);
  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(''), 3000); return () => clearTimeout(t); }, [toast]);

  // Migración: chats viejos (pre-multiusuario) estaban en 'demo_company_chats' sin namespace
  useEffect(() => {
    if (!username) return;
    try {
      const oldRaw = localStorage.getItem(STORAGE_KEY); // 'demo_company_chats'
      const newRaw = localStorage.getItem(chatsKey(username));
      const hasOld = oldRaw && oldRaw !== '[]' && oldRaw !== 'null';
      const hasNew = newRaw && newRaw !== '[]' && newRaw !== 'null';
      if (hasOld && !hasNew) {
        localStorage.setItem(chatsKey(username), oldRaw);
        localStorage.removeItem(STORAGE_KEY);
        setChats(JSON.parse(oldRaw));
        setToast('✓ Recuperé tus conversaciones anteriores');
      }
    } catch {}
  }, [username]);

  // ── Carga de agentes disponibles ────────────────────────────────
  useEffect(() => {
    if (!token) return;
    fetch('/api/agents', { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => {
        if (!d) return;
        setAgents(d.agents || []);
        // Si el agente guardado en localStorage ya no está disponible, caer al default
        const ids = new Set((d.agents || []).map(a => a.id));
        if (!currentAgentId || !ids.has(currentAgentId)) {
          setCurrentAgentId(d.default_agent_id || (d.agents || [])[0]?.id || null);
        }
      })
      .catch(() => {});
  }, [token]);

  // Persistir el agente activo
  useEffect(() => {
    if (!currentAgentId || !username) return;
    try { localStorage.setItem(`demo_company_agent_${username}`, currentAgentId); } catch {}
  }, [currentAgentId, username]);

  // Cerrar el menú al click afuera
  useEffect(() => {
    if (!agentMenuOpen) return;
    const handler = e => { if (!e.target.closest('.agent-selector')) setAgentMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [agentMenuOpen]);

  const currentAgent = agents.find(a => a.id === currentAgentId) || null;

  // Cambiar de agente: limpia chat activo (cada hilo es de un agente)
  function switchAgent(newAgentId) {
    if (newAgentId === currentAgentId) { setAgentMenuOpen(false); return; }
    setCurrentAgentId(newAgentId);
    setAgentMenuOpen(false);
    setActiveId(null);
    setMessages([]);
    setInput('');
    setPendingImg(null);
    setPendingDocs([]);
    setFeedback({});
    setThinkingSteps([]);
  }

  // En mobile: cerrar sidebar al seleccionar una conversación o crear una nueva
  function autoCloseSidebarMobile() {
    if (window.innerWidth <= 720) setSidebarOpen(false);
  }
  function startNewChat() { setActiveId(null); setMessages([]); setInput(''); setPendingImg(null); setFeedback({}); autoCloseSidebarMobile(); }
  function loadChat(id) {
    const c = chats.find(c => c.id === id);
    if (!c) return;
    // Si el chat es de otro asistente, cambiar al asistente correspondiente
    const chatAgent = c.agentId || 'fidi';
    if (chatAgent !== currentAgentId) setCurrentAgentId(chatAgent);
    setActiveId(id); setMessages(c.messages); setFeedback({}); autoCloseSidebarMobile();
  }
  function deleteChat(id) { const u = chats.filter(c => c.id !== id); setChats(u); saveChats(u, username); if (activeId === id) startNewChat(); }
  function persistMessages(id, msgs) {
    setChats(prev => {
      const exists = prev.find(c => c.id === id);
      const updated = exists
        ? prev.map(c => c.id === id ? { ...c, messages: msgs } : c)
        : [{ id, title: convTitle(msgs), date: new Date().toISOString(), agentId: currentAgentId, messages: msgs }, ...prev];
      saveChats(updated, username); return updated;
    });
  }

  function ingestImageFile(file, defaultName) {
    if (!file) return;
    if (!file.type.startsWith('image/')) return;
    if (file.size > 8 * 1024 * 1024) { setToast('⚠️ Imagen muy grande (máx 8MB)'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const [header, data] = ev.target.result.split(',');
      setPendingImg({
        data,
        mediaType: header.match(/:(.*?);/)[1],
        previewUrl: ev.target.result,
        name: file.name || defaultName || 'pegado.png',
      });
    };
    reader.readAsDataURL(file);
  }

  function handleFileChange(e) {
    ingestImageFile(e.target.files[0]);
    e.target.value = '';
  }

  async function handleDocFileChange(e) {
    const file = e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (file.size > 25 * 1024 * 1024) {
      setToast('⚠️ Archivo muy grande (máx 25MB)');
      return;
    }
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    if (!['pdf','docx','pptx','xlsx','xlsm','csv','txt','md'].includes(ext)) {
      setToast('⚠️ Formato no soportado. Usá PDF, Word, Excel, PowerPoint, CSV o TXT.');
      return;
    }
    setUploadingDoc(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch('/api/upload-document', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: fd,
      });
      if (r.status === 401) { onLogout(); return; }
      const d = await r.json();
      if (!r.ok) {
        setToast(`⚠️ ${d.detail || 'No se pudo procesar el archivo'}`);
        return;
      }
      setPendingDocs(prev => [...prev, { filename: d.filename, char_count: d.char_count, text: d.text }]);
      setToast(`✓ ${d.filename} (${d.char_count.toLocaleString()} chars) listo para consultar`);
    } catch {
      setToast('⚠️ Error subiendo el archivo');
    } finally {
      setUploadingDoc(false);
    }
  }

  function removeDoc(idx) {
    setPendingDocs(prev => prev.filter((_, i) => i !== idx));
  }

  function buildDocContext() {
    if (!pendingDocs.length) return '';
    return pendingDocs.map((d, i) =>
      `=== Documento ${i + 1}: ${d.filename} (${d.char_count} caracteres) ===\n${d.text}`
    ).join('\n\n');
  }

  function handlePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        const ext  = (file.type.split('/')[1] || 'png').split('+')[0];
        ingestImageFile(file, `pegado-${Date.now()}.${ext}`);
        setToast('📋 Imagen pegada desde el portapapeles');
        return;
      }
    }
  }

  function toggleVoice() {
    if (recording) { recogRef.current?.stop(); setRecording(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR(); r.lang = 'es'; r.continuous = false; r.interimResults = false;
    r.onresult = e => { const t = e.results[0][0].transcript; setInput(p => p ? p + ' ' + t : t); };
    r.onerror = () => setRecording(false); r.onend = () => setRecording(false);
    recogRef.current = r; r.start(); setRecording(true);
  }

  function openAdmin() {
    if (adminToken) setAdminState('panel');
    else setAdminState('login');
  }

  async function reloadStock() {
    try {
      const r = await fetch('/api/reload-stock', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      if (r.status === 401) { onLogout(); return; }
      setToast((await r.json()).message || 'Catálogo recargado');
    } catch { setToast('Error al recargar el catálogo'); }
  }

  // Regenerar la última respuesta del agente: quita el último mensaje assistant
  // y re-envía el último mensaje user para que el modelo dé una nueva respuesta.
  async function regenerateLast() {
    if (loading) return;
    // Buscar último mensaje user
    let lastUserIdx = -1;
    for (let i = messages.length - 1; i >= 0; i--) {
      if (messages[i].role === 'user') { lastUserIdx = i; break; }
    }
    if (lastUserIdx === -1) return;
    const lastUser = messages[lastUserIdx];
    // Reset feedback de los mensajes que se van a borrar
    const newFb = {};
    Object.entries(feedback).forEach(([k, v]) => { if (Number(k) < lastUserIdx) newFb[k] = v; });
    setFeedback(newFb);
    // Truncar mensajes hasta antes del user message
    const kept = messages.slice(0, lastUserIdx);
    setMessages(kept);
    // Re-enviar: usamos el contenido del último user (texto o imagen+texto)
    const userText = typeof lastUser.content === 'string'
      ? lastUser.content
      : (lastUser.content.find(b => b.type === 'text')?.text || '');
    // Re-stage la imagen si la había
    const userImg = typeof lastUser.content === 'string'
      ? null
      : lastUser.content.find(b => b.type === 'image');
    if (userImg) {
      setPendingImg({
        data: userImg.source.data,
        mediaType: userImg.source.media_type,
        previewUrl: `data:${userImg.source.media_type};base64,${userImg.source.data}`,
        name: 'regenerada',
      });
    }
    // Esperar un tick para que el state se asiente, después enviar
    setTimeout(() => { sendMessage(userText); }, 50);
  }

  async function sendMessage(text) {
    text = (text || input).trim();
    if ((!text && !pendingImg && !pendingDocs.length) || loading) return;
    // Indicar visualmente al usuario qué documentos van adjuntos en este turno
    const docNote = pendingDocs.length
      ? `\n\n📎 Adjunto: ${pendingDocs.map(d => d.filename).join(', ')}`
      : '';
    const visibleText = text + docNote;
    let content = pendingImg
      ? [{ type: 'image', source: { type: 'base64', media_type: pendingImg.mediaType, data: pendingImg.data } }, ...(visibleText ? [{ type: 'text', text: visibleText }] : [])]
      : visibleText;

    const docContext = buildDocContext();
    const newMessages = [...messages, { role: 'user', content }];
    const currentId = activeId || genId();
    if (!activeId) setActiveId(currentId);
    setMessages(newMessages); setInput(''); setPendingImg(null); setPendingDocs([]); setLoading(true); setThinkingSteps([]); setActiveModel(null);

    let streamedText = '';
    let assistantAdded = false;

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ messages: newMessages, system_context: docContext, agent_id: currentAgentId }),
      });
      if (res.status === 401) { onLogout(); return; }
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        const err = [...newMessages, { role: 'assistant', content: `⚠️ Error: ${d.detail || 'Error inesperado.'}` }];
        setMessages(err); persistMessages(currentId, err); return;
      }

      await readSSE(res, (evt) => {
        if (evt.type === 'model_selected') {
          setActiveModel({ model: evt.model, source: evt.source });
        } else if (evt.type === 'thinking') {
          setThinkingSteps(prev => {
            const i = prev.findIndex(s => s.tool === evt.tool && s.query === evt.query);
            if (i >= 0) { const u = [...prev]; u[i] = evt; return u; }
            return [...prev, evt];
          });
        } else if (evt.type === 'text') {
          streamedText += evt.text;
          if (!assistantAdded) {
            assistantAdded = true;
            setMessages([...newMessages, { role: 'assistant', content: streamedText, streaming: true }]);
          } else {
            setMessages(prev => {
              const updated = [...prev];
              const last = updated[updated.length - 1];
              if (last && last.role === 'assistant') {
                updated[updated.length - 1] = { ...last, content: streamedText, streaming: true };
              }
              return updated;
            });
          }
        } else if (evt.type === 'done') {
          const final = [...newMessages, { role: 'assistant', content: streamedText || '(Sin respuesta del modelo)' }];
          setMessages(final); persistMessages(currentId, final);
        } else if (evt.type === 'error') {
          const err = [...newMessages, { role: 'assistant', content: `⚠️ Error: ${evt.message}` }];
          setMessages(err); persistMessages(currentId, err);
        }
      });
    } catch {
      const err = [...newMessages, { role: 'assistant', content: '⚠️ No se pudo conectar.' }];
      setMessages(err); persistMessages(currentId, err);
    } finally { setLoading(false); setThinkingSteps([]); textareaRef.current?.focus(); }
  }

  const _q = sidebarQuery.trim().toLowerCase();
  // Filtrar conversaciones por agente activo. Chats viejos sin agentId → asumimos default.
  const _chatsForAgent = currentAgentId
    ? chats.filter(c => (c.agentId || 'fidi') === currentAgentId)
    : chats;
  const filteredChats = _q
    ? _chatsForAgent.filter(c => (c.title || '').toLowerCase().includes(_q))
    : _chatsForAgent;
  const groups = groupByDate([...filteredChats].sort((a, b) => new Date(b.date) - new Date(a.date)));
  const chatTitle = activeId
    ? (chats.find(c => c.id === activeId)?.title || 'Conversación')
    : 'Nueva consulta';

  // ── Exportar conversación como archivo .txt descargable ─────────
  function exportConversation() {
    if (!messages.length) {
      setToast('No hay nada para compartir todavía.');
      return;
    }
    const now = new Date();
    const dateStr = now.toLocaleString('es-UY', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const userLabel = (username || 'Usuario').toUpperCase();
    const header = [
      '═══════════════════════════════════════════════════════════════',
      '  DEMO COMPANY · CORTEX',
      `  Conversación: ${chatTitle}`,
      `  Usuario: ${username || '—'}`,
      `  Exportado: ${dateStr}`,
      '═══════════════════════════════════════════════════════════════',
      '',
    ].join('\n');

    // Convertir cada mensaje a texto plano
    const parts = messages.map(m => {
      let body;
      if (typeof m.content === 'string') {
        body = m.content;
      } else if (Array.isArray(m.content)) {
        const text = m.content.find(b => b.type === 'text')?.text || '';
        const hasImg = m.content.some(b => b.type === 'image');
        body = (hasImg ? '[Imagen adjunta]\n' : '') + text;
      } else {
        body = String(m.content || '');
      }
      // Limpiar markdown básico para que se lea como texto plano
      const clean = body
        .replace(/\*\*(.+?)\*\*/g, '$1')           // negritas
        .replace(/\*(.+?)\*/g, '$1')                // itálicas
        .replace(/`(.+?)`/g, '$1')                  // inline code
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)')  // links → "texto (url)"
        .replace(/^#{1,6}\s+/gm, '')                // headings
        .replace(/^\s*[-*]\s+/gm, ' • ')            // listas
        .replace(/\n{3,}/g, '\n\n');                // colapsar saltos múltiples
      const who = m.role === 'user' ? userLabel : 'DEMO COMPANY CORTEX';
      return `[ ${who} ]\n${'─'.repeat(64)}\n${clean.trim()}`;
    });

    const footer = [
      '',
      '═══════════════════════════════════════════════════════════════',
      '  Fin de la conversación',
      '  Generado por Demo Company S.A. — Agente Consultor',
      '═══════════════════════════════════════════════════════════════',
    ].join('\n');

    const text = header + parts.join('\n\n\n') + footer;

    // Crear blob + link descargable
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const safeTitle = (chatTitle || 'conversacion').replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_').slice(0, 40) || 'conversacion';
    const dateTag   = now.toISOString().slice(0, 10);
    a.href     = url;
    a.download = `demo_company_${dateTag}_${safeTitle}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setToast('✓ Conversación exportada como .txt');
  }
  const SUGGESTED_PROMPTS = [
    { icon: 'Valve',  cat: 'Búsqueda en catálogo', text: '¿Qué válvulas BERMAD tienen disponibles?' },
    { icon: 'Sensor', cat: 'Sensores',             text: 'Sensores de nivel NIVELCO para tanque de 6m' },
    { icon: 'Wrench', cat: 'Selección',            text: 'Actuador neumático NUTORK para válvula DN150' },
    { icon: 'Book',   cat: 'Normativas',           text: '¿Qué norma aplica para válvulas API 600?' },
    { icon: 'Valve',  cat: 'Comparativa',          text: '¿Diferencia entre válvula de bola y compuerta?' },
    { icon: 'Wrench', cat: 'Recomendación',        text: 'Válvula para fluido corrosivo a 80°C — ¿qué recomendás?' },
  ];

  const userInitials = (username || 'U').slice(0, 2).toUpperCase();

  return (
    <div className="app" data-sidebar={sidebarOpen ? "open" : "collapsed"}>
      {adminState === 'login' && (
        <AdminLoginModal
          onSuccess={tok => { setAdminToken(tok); setAdminState('panel'); }}
          onClose={() => setAdminState(null)}
        />
      )}
      {adminState === 'panel' && adminToken && (
        <AdminPanel adminToken={adminToken} onClose={() => setAdminState(null)} />
      )}
      {toast && <div className="toast">{toast}</div>}

      {/* ── Topbar ─────────────────────────────────────────────── */}
      <header className="topbar">
        <button className="topbar-icon-btn" onClick={() => setSidebarOpen(v => !v)} aria-label="Toggle sidebar">
          <Icon.Menu />
        </button>
        <div className="brand">
          <span className="brand-logo">Demo Company</span>
          <span className="brand-cortex">Cortex</span>
        </div>
        <div className="topbar-spacer" />
        {username && (
          <button className="topbar-user" title={username}>
            <span className="avatar-mini">{userInitials}</span>
            <span>{username}</span>
          </button>
        )}
        <button className="topbar-icon-btn" onClick={onToggleTheme} aria-label={theme === 'dark' ? 'Modo claro' : 'Modo oscuro'} title={theme === 'dark' ? 'Modo claro' : 'Modo oscuro'}>
          {theme === 'dark' ? <Icon.Sun /> : <Icon.Moon />}
        </button>
        <button className="topbar-icon-btn" onClick={openAdmin} aria-label="Panel de administración">
          <Icon.Settings />
        </button>
        <button className="btn-salir" onClick={onLogout}>Salir</button>
      </header>

      {/* ── Sidebar ────────────────────────────────────────────── */}
      <aside className="sidebar">
        <div className="sidebar-top">
          {/* Selector de asistente */}
          {agents.length > 0 && (
            <div className="agent-selector">
              <button
                className="agent-selector-btn"
                onClick={() => setAgentMenuOpen(o => !o)}
                title="Cambiar asistente"
              >
                <span className="agent-icon">{currentAgent?.icon || '🤖'}</span>
                <span className="agent-name">{currentAgent?.name || 'Asistente'}</span>
                <span className="agent-chevron">{agentMenuOpen ? '▲' : '▼'}</span>
              </button>
              {agentMenuOpen && (
                <div className="agent-selector-menu">
                  {agents.map(a => (
                    <div
                      key={a.id}
                      className={"agent-option" + (a.id === currentAgentId ? ' active' : '')}
                      onClick={() => switchAgent(a.id)}
                    >
                      <span className="agent-icon">{a.icon || '🤖'}</span>
                      <div className="agent-option-text">
                        <div className="agent-option-name">{a.name}</div>
                        {a.description && <div className="agent-option-desc">{a.description}</div>}
                      </div>
                      {a.id === currentAgentId && <span className="check">✓</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          <button className="new-consult-btn" onClick={startNewChat}>
            <span className="pencil-icon"><Icon.Edit /></span>
            <span>Nueva consulta</span>
          </button>
          <div className="sidebar-search">
            <span className="sidebar-search-icon"><Icon.Search /></span>
            <input
              type="text"
              placeholder="Buscar conversaciones"
              value={sidebarQuery}
              onChange={e => setSidebarQuery(e.target.value)}
            />
          </div>
        </div>
        <nav className="conv-section">
          {Object.keys(groups).length === 0 ? (
            <div className="conv-empty">
              {sidebarQuery ? 'Sin coincidencias' : 'Todavía no hay conversaciones'}
            </div>
          ) : Object.entries(groups).map(([label, group], gi) => (
            <div className="conv-group" key={label}>
              <div className={"conv-group-label" + (gi === 0 ? " first" : "")}>{label}</div>
              {group.map(c => {
                const IconCmp = Icon[pickConvIcon(c.title)] || Icon.Message;
                return (
                  <button
                    key={c.id}
                    className={"conv-item" + (activeId === c.id ? " active" : "")}
                    onClick={() => loadChat(c.id)}
                    title={c.title}
                  >
                    <span className="conv-item-icon"><IconCmp /></span>
                    <span className="conv-item-text">{c.title}</span>
                    <span
                      className="conv-item-delete"
                      onClick={e => { e.stopPropagation(); deleteChat(c.id); }}
                      title="Eliminar conversación"
                    >
                      <Icon.X width="13" height="13" />
                    </span>
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
      </aside>

      {/* Backdrop clickeable solo visible en mobile cuando el sidebar está abierto */}
      <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)} aria-hidden="true" />

      {/* ── Main ───────────────────────────────────────────────── */}
      <main className="main">
        <div className="chat-header">
          <div className="chat-title">{chatTitle}</div>
          <div className="chat-header-actions">
            <button
              className="icon-btn-ghost"
              title="Exportar conversación como archivo de texto"
              onClick={exportConversation}
              disabled={messages.length === 0}
              style={messages.length === 0 ? { opacity: 0.35, cursor: 'not-allowed' } : undefined}
            >
              <Icon.Share />
            </button>
          </div>
        </div>
        <div className="chat-scroll">
          <div className="chat-inner">
            <div className="messages-area">
            {messages.length === 0 ? (
              <div className="welcome">
                <div className="welcome-mark">
                  {currentAgent?.icon ? (
                    <span style={{ fontSize: 32 }}>{currentAgent.icon}</span>
                  ) : (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 12h4M17 12h4"/><circle cx="12" cy="12" r="5"/><path d="M12 7v-3M12 20v-3"/>
                    </svg>
                  )}
                </div>
                <h1 className="welcome-title">Buenas, {username || 'usuario'}.</h1>
                <p className="welcome-subtitle">
                  {currentAgent
                    ? <>Estás hablando con <b>{currentAgent.name}</b>{currentAgent.description ? ` — ${currentAgent.description}` : ''}</>
                    : <>¿Qué necesitás <b>encontrar</b> hoy?</>
                  }
                </p>
              </div>
            ) : (
              <>
                {messages.map((m, i) => {
                  const isLast = i === messages.length - 1;
                  const isStreaming = m.streaming && isLast;
                  const isUser = m.role === 'user';
                  return (
                    <div key={i} className={`message-row ${m.role}`}>
                      <div className="message-block">
                        <div className="message-meta">{isUser ? (username || 'Usuario') : (currentAgent?.name || 'Demo Company Cortex')}</div>
                        {isUser ? (
                          <div className="user-bubble"><UserContent content={m.content} /></div>
                        ) : (
                          <>
                            <div className="assistant-card">
                              <AssistantMd content={m.content} />
                              {isStreaming && <span className="streaming-cursor" />}
                            </div>
                            {!isStreaming && !loading && (
                              <div className="msg-actions">
                                {isLast && (
                                  <button className="msg-action-btn" onClick={regenerateLast} title="Regenerar respuesta">
                                    <Icon.Refresh /><span>Regenerar</span>
                                  </button>
                                )}
                                <button
                                  className={"msg-action-btn" + (feedback[i] === 'up' ? ' active' : '')}
                                  onClick={() => setFeedback(p => ({ ...p, [i]: p[i] === 'up' ? null : 'up' }))}
                                  title="Útil"
                                >
                                  <Icon.ThumbUp />
                                </button>
                                <button
                                  className={"msg-action-btn" + (feedback[i] === 'down' ? ' active' : '')}
                                  onClick={() => setFeedback(p => ({ ...p, [i]: p[i] === 'down' ? null : 'down' }))}
                                  title="No útil"
                                >
                                  <Icon.ThumbDown />
                                </button>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
                {loading && (
                  <WorkingChip
                    steps={thinkingSteps}
                    isStreaming={!!messages[messages.length - 1]?.streaming}
                    activeModel={activeModel}
                  />
                )}
                {loading && thinkingSteps.length > 0 && (
                  <ThinkingIndicator steps={thinkingSteps} loading={loading} />
                )}
                {loading && thinkingSteps.length === 0 && !(messages[messages.length - 1]?.streaming) && (
                  <div className="progress-bar">
                    <span className="progress-bar-label">Procesando consulta</span>
                    <div className="progress-bar-track"><div className="progress-bar-fill" /></div>
                  </div>
                )}
                <div ref={bottomRef} />
              </>
            )}
            </div>
          </div>
        </div>

        <div className="composer-wrap">
          {pendingImg && (
            <div className="composer-attachment-preview">
              <img src={pendingImg.previewUrl} className="composer-attachment-thumb" alt="" />
              <span className="composer-attachment-name">{pendingImg.name}</span>
              <button className="composer-attachment-remove" onClick={() => setPendingImg(null)} title="Quitar imagen">
                <Icon.X width="14" height="14" />
              </button>
            </div>
          )}
          {pendingDocs.map((d, i) => (
            <div key={i} className="composer-attachment-preview">
              <div className="composer-attachment-doc-icon">📄</div>
              <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minWidth: 0 }}>
                <span className="composer-attachment-name">{d.filename}</span>
                <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{d.char_count.toLocaleString()} caracteres extraídos</span>
              </div>
              <button className="composer-attachment-remove" onClick={() => removeDoc(i)} title="Quitar documento">
                <Icon.X width="14" height="14" />
              </button>
            </div>
          ))}
          {uploadingDoc && (
            <div className="composer-attachment-preview">
              <span className="thinking-spinner" />
              <span className="composer-attachment-name">Procesando documento…</span>
            </div>
          )}
          <div className="composer">
            <div className="composer-tools">
              <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleFileChange} />
              <input ref={docFileRef} type="file" accept=".pdf,.docx,.pptx,.xlsx,.xlsm,.csv,.txt,.md,application/pdf" style={{ display: 'none' }} onChange={handleDocFileChange} />
              <button className="composer-icon-btn" onClick={() => fileRef.current?.click()} disabled={loading || uploadingDoc} title="Adjuntar imagen">
                <Icon.Paperclip />
              </button>
              <button className="composer-icon-btn" onClick={() => docFileRef.current?.click()} disabled={loading || uploadingDoc} title="Adjuntar documento (PDF, Word, Excel, PowerPoint)">
                <Icon.Doc />
              </button>
            </div>
            <textarea
              ref={textareaRef} rows={1}
              className="composer-input"
              placeholder={pendingImg ? "Agregá una descripción (opcional)…" : "Consultá productos o pegá una imagen con Ctrl+V…"}
              value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
              onPaste={handlePaste}
              disabled={loading}
              onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px'; }}
            />
            {HAS_SPEECH && (
              <div className="composer-tools">
                <button
                  className={`composer-icon-btn${recording ? ' recording' : ''}`}
                  onClick={toggleVoice}
                  disabled={loading}
                  title={recording ? 'Detener dictado' : 'Dictar por voz'}
                >
                  <Icon.Mic />
                </button>
              </div>
            )}
            <button
              className={`composer-send${loading ? ' is-loading' : ''}`}
              onClick={() => sendMessage()}
              disabled={loading || (!input.trim() && !pendingImg)}
              title={loading ? 'Trabajando…' : 'Enviar (Enter)'}
            >
              {loading ? <span className="composer-send-spinner" /> : <Icon.ArrowUp />}
            </button>
          </div>
          <div className="composer-hint">
            <span className="composer-hint-text">
              Cortex puede cometer errores. Por favor, chequeá todas sus respuestas.
            </span>
            <span className="powered-by">powered by <b>AgentX</b></span>
          </div>
        </div>
      </main>
    </div>
  );
}

function App() {
  const [token, setTokenSt]    = useState(getToken);
  const [username, setUserSt]  = useState(getUsername);
  const [theme, setThemeSt]    = useState(() => localStorage.getItem('demo_company_theme') || 'light');

  // Aplicar tema al documento + persistir
  useEffect(() => {
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('demo_company_theme', theme);
  }, [theme]);

  const toggleTheme = () => setThemeSt(t => t === 'dark' ? 'light' : 'dark');

  if (!token) return <Login onLogin={(t, u) => { setTokenSt(t); setUserSt(u); }} />;
  return <Chat
    token={token}
    username={username}
    theme={theme}
    onToggleTheme={toggleTheme}
    onLogout={() => { clearToken(); clearUsername(); setTokenSt(null); setUserSt(''); }}
  />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
