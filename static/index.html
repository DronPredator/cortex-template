function Chat({ token, username, theme, onToggleTheme, onLogout }) {
  const [chats,         setChats]         = useState(() => loadChats(username));
  const [activeId,      setActiveId]      = useState(null);
  const [messages,      setMessages]      = useState([]);
  const [input,         setInput]         = useState('');
  const [loading,       setLoading]       = useState(false);
  const [thinkingSteps, setThinkingSteps] = useState([]);
  const [sidebarOpen,   setSidebarOpen]   = useState(() => typeof window !== 'undefined' ? window.innerWidth > 720 : true);
  const [sidebarQuery,  setSidebarQuery]  = useState('');
  const [feedback,      setFeedback]      = useState({}); // {msgIndex: 'up'|'down'}
  const [pendingImgs,   setPendingImgs]   = useState([]); // [{data, mediaType, previewUrl, name}]
  const [pendingDocs,   setPendingDocs]   = useState([]); // [{filename, char_count, text}]
  const [uploadingDoc,  setUploadingDoc]  = useState(false);
  // Cap total de adjuntos (imágenes + documentos) por mensaje
  const MAX_ATTACHMENTS = 8;
  const [activeModel,   setActiveModel]   = useState(null); // {model, source}
  const [recording,     setRecording]     = useState(false);
  const [adminState,    setAdminState]    = useState(null); // null | 'login' | 'panel'
  const [adminToken,    setAdminToken]    = useState(getAdminTok);
  const [toast,         setToast]         = useState('');
  // ── Agentes ─────────────────────────────────────────────────────
  const [agents,         setAgents]         = useState([]);
  const [currentAgentId, setCurrentAgentId] = useState(() => {
    try { return localStorage.getItem(`fidemar_agent_${username}`) || null; } catch { return null; }
  });
  const [agentMenuOpen,  setAgentMenuOpen]  = useState(false);

  const bottomRef  = useRef(null);
  const textareaRef = useRef(null);
  const fileRef    = useRef(null);
  const docFileRef = useRef(null);
  // AbortController activo durante un fetch a /api/chat/stream — sirve
  // para que el botón "detener" cancele la generación en curso.
  const abortRef   = useRef(null);
  const recogRef   = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading, thinkingSteps]);

  // Mantiene el textarea con altura ajustada al contenido. Reacciona a
  // cualquier cambio de `input` (escritura, clear post-envío, paste, etc.)
  // y NO depende de eventos del DOM — así no salta entre renders ni se
  // queda alto cuando se borra el contenido.
  // El cap (240px) tiene que coincidir con `max-height` del CSS
  // `.composer-input` — si los desincronizás, salta el scroll.
  useEffect(() => {
    const el = textareaRef.current;
    if (!el) return;
    el.style.height = 'auto';
    const next = Math.min(el.scrollHeight, 240);
    el.style.height = (next > 0 ? next : 0) + 'px';
  }, [input]);
  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(''), 3000); return () => clearTimeout(t); }, [toast]);

  // Migración: chats viejos (pre-multiusuario) estaban en 'fidemar_chats' sin namespace
  useEffect(() => {
    if (!username) return;
    try {
      const oldRaw = localStorage.getItem(STORAGE_KEY); // 'fidemar_chats'
      const newRaw = localStorage.getItem(chatsKey(username));
      const hasOld = oldRaw && oldRaw !== '[]' && oldRaw !== 'null';
      const hasNew = newRaw && newRaw !== '[]' && newRaw !== 'null';
      if (hasOld && !hasNew) {
        localStorage.setItem(chatsKey(username), oldRaw);
        localStorage.removeItem(STORAGE_KEY);
        setChats(JSON.parse(oldRaw));
        setToast('✓ Recuperé tus conversaciones anteriores');
      }
    } catch {}
  }, [username]);

  // ── Carga de agentes disponibles ────────────────────────────────
  // BUG-FIX v1.3.4: antes el .catch era silencioso, así que si el token
  // JWT expiraba (8h max) o el server caía, el frontend quedaba con
  // agents=[] → no se renderizaba el selector → el usuario veía la
  // welcome screen sin opciones y sin entender por qué. Ahora:
  //   - 401 → auto-logout (force re-login)
  //   - otros errores → toast visible con el mensaje real
  useEffect(() => {
    if (!token) return;
    let aborted = false;
    (async () => {
      try {
        const r = await fetch('/api/agents', { headers: { Authorization: `Bearer ${token}` } });
        if (aborted) return;
        if (r.status === 401) {
          // Token expirado / inválido → logout y dejar al usuario re-loguear.
          // No mostramos toast porque el flujo de re-login ya es señal suficiente.
          onLogout();
          return;
        }
        if (!r.ok) {
          const detail = await r.text().catch(() => '');
          throw new Error(`HTTP ${r.status}: ${detail.slice(0, 200) || r.statusText}`);
        }
        const d = await r.json();
        if (aborted) return;
        setAgents(d.agents || []);
        // Si el agente guardado en localStorage ya no está disponible, caer al default
        const ids = new Set((d.agents || []).map(a => a.id));
        if (!currentAgentId || !ids.has(currentAgentId)) {
          setCurrentAgentId(d.default_agent_id || (d.agents || [])[0]?.id || null);
        }
      } catch (e) {
        if (aborted) return;
        setToast(`⚠️ No se pudieron cargar los asistentes: ${e.message}`);
      }
    })();
    return () => { aborted = true; };
  }, [token]);

  // Persistir el agente activo
  useEffect(() => {
    if (!currentAgentId || !username) return;
    try { localStorage.setItem(`fidemar_agent_${username}`, currentAgentId); } catch {}
  }, [currentAgentId, username]);

  // Cerrar el menú al click afuera
  useEffect(() => {
    if (!agentMenuOpen) return;
    const handler = e => { if (!e.target.closest('.agent-selector')) setAgentMenuOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, [agentMenuOpen]);

  const currentAgent = agents.find(a => a.id === currentAgentId) || null;

  // Saludo del welcome screen: se calcula UNA sola vez al montar el componente.
  // Sin esto, React recalcula `pickGreeting()` en cada render y el saludo
  // "salta" ante los ojos del usuario al escribir o cambiar de agente.
  const [greeting] = useState(() => pickGreeting(username));

  // Ejemplos de consultas del agente activo (welcome screen)
  const [examples, setExamples] = useState([]);
  // Razonamiento del modelo durante la generación (ephemeral). Se llena con
  // eventos `reasoning` del SSE; se limpia al empezar otro stream. La idea
  // es mostrar el "pensamiento" del modelo (Steamy, Generador) en vivo,
  // como ya hacíamos con FIDI vía thinking events.
  const [reasoningText, setReasoningText] = useState('');
  // Edición inline de mensaje del usuario (estilo Gemini). Cuando es null
  // no hay edición activa; cuando es un número, ese índice del array
  // messages está en modo edit y se renderiza un textarea inline.
  const [editingMessageIdx, setEditingMessageIdx] = useState(null);
  const [editDraft, setEditDraft] = useState('');

  useEffect(() => {
    if (!token || !currentAgentId) { setExamples([]); return; }
    fetch(`/api/agents/${encodeURIComponent(currentAgentId)}/examples?count=3`,
      { headers: { Authorization: `Bearer ${token}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => setExamples(d?.examples || []))
      .catch(() => setExamples([]));
  }, [token, currentAgentId]);

  function pickExample(text) {
    setInput(text);
    setTimeout(() => textareaRef.current?.focus(), 50);
  }

  // Cambiar de agente: limpia chat activo (cada hilo es de un agente)
  function switchAgent(newAgentId) {
    if (newAgentId === currentAgentId) { setAgentMenuOpen(false); return; }
    setCurrentAgentId(newAgentId);
    setAgentMenuOpen(false);
    setActiveId(null);
    setMessages([]);
    setInput('');
    setPendingImgs([]);
    setPendingDocs([]);
    setFeedback({});
    setThinkingSteps([]);
  }

  // En mobile: cerrar sidebar al seleccionar una conversación o crear una nueva
  function autoCloseSidebarMobile() {
    if (window.innerWidth <= 720) setSidebarOpen(false);
  }
  function startNewChat() { setActiveId(null); setMessages([]); setInput(''); setPendingImgs([]); setFeedback({}); autoCloseSidebarMobile(); }
  function loadChat(id) {
    const c = chats.find(c => c.id === id);
    if (!c) return;
    // Si el chat es de otro asistente, cambiar al asistente correspondiente
    const chatAgent = c.agentId || 'fidi';
    if (chatAgent !== currentAgentId) setCurrentAgentId(chatAgent);
    setActiveId(id); setMessages(c.messages); setFeedback({}); autoCloseSidebarMobile();
  }
  function deleteChat(id) { const u = chats.filter(c => c.id !== id); setChats(u); saveChats(u, username); if (activeId === id) startNewChat(); }
  function persistMessages(id, msgs) {
    setChats(prev => {
      const exists = prev.find(c => c.id === id);
      const updated = exists
        ? prev.map(c => c.id === id ? { ...c, messages: msgs } : c)
        : [{ id, title: convTitle(msgs), date: new Date().toISOString(), agentId: currentAgentId, messages: msgs }, ...prev];
      saveChats(updated, username); return updated;
    });
  }

  // Total actual de adjuntos (imágenes + docs). Lo lee como callback para
  // que checkAttachmentSlot vea el state más reciente cuando se loopea.
  function attachmentsCount() {
    return pendingImgs.length + pendingDocs.length;
  }
  function canAddMoreAttachments(extra = 1) {
    if (attachmentsCount() + extra > MAX_ATTACHMENTS) {
      setToast(`⚠️ Máximo ${MAX_ATTACHMENTS} archivos por consulta`);
      return false;
    }
    return true;
  }

  function ingestImageFile(file, defaultName) {
    if (!file) return;
    if (!file.type.startsWith('image/')) return;
    if (file.size > 8 * 1024 * 1024) { setToast('⚠️ Imagen muy grande (máx 8MB)'); return; }
    const reader = new FileReader();
    reader.onload = ev => {
      const [header, data] = ev.target.result.split(',');
      const newImg = {
        data,
        mediaType: header.match(/:(.*?);/)[1],
        previewUrl: ev.target.result,
        name: file.name || defaultName || 'pegado.png',
      };
      setPendingImgs(prev => {
        // Cap defensivo en el setter (por si llegan asíncronas)
        if (prev.length + pendingDocs.length >= MAX_ATTACHMENTS) {
          setToast(`⚠️ Máximo ${MAX_ATTACHMENTS} archivos por consulta`);
          return prev;
        }
        return [...prev, newImg];
      });
    };
    reader.readAsDataURL(file);
  }

  function handleFileChange(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = '';
    const slotsLeft = MAX_ATTACHMENTS - attachmentsCount();
    if (slotsLeft <= 0) {
      setToast(`⚠️ Máximo ${MAX_ATTACHMENTS} archivos por consulta`);
      return;
    }
    files.slice(0, slotsLeft).forEach(f => ingestImageFile(f));
    if (files.length > slotsLeft) {
      setToast(`⚠️ Solo se cargaron las primeras ${slotsLeft} imágenes (máx ${MAX_ATTACHMENTS} totales)`);
    }
  }

  // Handler unificado: dispatch por tipo de archivo (imagen vs documento)
  // Reemplaza el flow viejo donde había 2 inputs separados.
  async function handleAnyFileChange(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = '';
    if (!files.length) return;

    const slotsLeft = MAX_ATTACHMENTS - attachmentsCount();
    if (slotsLeft <= 0) {
      setToast(`⚠️ Máximo ${MAX_ATTACHMENTS} archivos por consulta`);
      return;
    }
    const toProcess = files.slice(0, slotsLeft);
    if (files.length > slotsLeft) {
      setToast(`⚠️ Solo se procesarán los primeros ${slotsLeft} archivos`);
    }

    // Separar por tipo. Las imágenes van por ingestImageFile (in-memory),
    // los documentos van al endpoint /api/upload-document (extracción server).
    const imgs = [];
    const docs = [];
    for (const f of toProcess) {
      if (f.type && f.type.startsWith('image/')) {
        imgs.push(f);
      } else {
        docs.push(f);
      }
    }

    imgs.forEach(f => ingestImageFile(f));

    if (docs.length) {
      setUploadingDoc(true);
      let ok = 0;
      try {
        for (const f of docs) {
          if (await uploadOneDoc(f)) ok++;
        }
        if (ok > 0) {
          setToast(`✓ ${ok} documento${ok !== 1 ? 's' : ''} listo${ok !== 1 ? 's' : ''} para consultar`);
        }
      } finally {
        setUploadingDoc(false);
      }
    }
  }

  async function uploadOneDoc(file) {
    if (file.size > 25 * 1024 * 1024) {
      setToast(`⚠️ "${file.name}" muy grande (máx 25MB)`);
      return false;
    }
    const ext = (file.name.split('.').pop() || '').toLowerCase();
    if (!['pdf','docx','pptx','xlsx','xlsm','csv','txt','md'].includes(ext)) {
      setToast(`⚠️ "${file.name}": formato no soportado`);
      return false;
    }
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch('/api/upload-document', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
        body: fd,
      });
      if (r.status === 401) { onLogout(); return false; }
      const d = await r.json();
      if (!r.ok) {
        setToast(`⚠️ ${d.detail || 'No se pudo procesar el archivo'}`);
        return false;
      }
      setPendingDocs(prev => [...prev, { filename: d.filename, char_count: d.char_count, text: d.text }]);
      return true;
    } catch {
      setToast(`⚠️ Error subiendo "${file.name}"`);
      return false;
    }
  }

  async function handleDocFileChange(e) {
    const files = Array.from(e.target.files || []);
    e.target.value = '';
    if (!files.length) return;

    const slotsLeft = MAX_ATTACHMENTS - attachmentsCount();
    if (slotsLeft <= 0) {
      setToast(`⚠️ Máximo ${MAX_ATTACHMENTS} archivos por consulta`);
      return;
    }
    const toUpload = files.slice(0, slotsLeft);
    if (files.length > slotsLeft) {
      setToast(`⚠️ Solo se procesarán los primeros ${slotsLeft} archivos`);
    }

    setUploadingDoc(true);
    let okCount = 0;
    try {
      // Subir secuencialmente — el endpoint procesa de a uno, evita pico de RAM
      for (const f of toUpload) {
        const ok = await uploadOneDoc(f);
        if (ok) okCount++;
      }
      if (okCount > 0) {
        setToast(`✓ ${okCount} documento${okCount !== 1 ? 's' : ''} listo${okCount !== 1 ? 's' : ''} para consultar`);
      }
    } finally {
      setUploadingDoc(false);
    }
  }

  function removeImg(idx) {
    setPendingImgs(prev => prev.filter((_, i) => i !== idx));
  }

  function removeDoc(idx) {
    setPendingDocs(prev => prev.filter((_, i) => i !== idx));
  }

  function buildDocContext() {
    if (!pendingDocs.length) return '';
    return pendingDocs.map((d, i) =>
      `=== Documento ${i + 1}: ${d.filename} (${d.char_count} caracteres) ===\n${d.text}`
    ).join('\n\n');
  }

  async function downloadProtectedFile(href) {
    try {
      const u = new URL(href, window.location.origin);
      const r = await fetch(u.pathname, { headers: { Authorization: `Bearer ${token}` } });
      if (r.status === 401) { onLogout(); return; }
      if (!r.ok) {
        setToast('No se pudo descargar el archivo');
        return;
      }
      const blob = await r.blob();
      const cd = r.headers.get('Content-Disposition') || '';
      const match = cd.match(/filename="?([^"]+)"?/i);
      const filename = match?.[1] || decodeURIComponent(u.pathname.split('/').pop() || 'archivo');
      const blobUrl = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(blobUrl);
    } catch {
      setToast('No se pudo descargar el archivo');
    }
  }

  function handlePaste(e) {
    // El clipboard puede traer 2 fuentes distintas:
    //   1. `e.clipboardData.files` → archivos copiados del explorer/desktop
    //      con Ctrl+C (Windows) o equivalente. Cualquier tipo (PDF, Word,
    //      PNG, etc.) — los procesamos via handleAnyFileChange.
    //   2. `e.clipboardData.items` → datos en formato item (image/png cuando
    //      hacés print-screen, text/plain cuando copiás texto). Las imágenes
    //      que vienen acá NO aparecen en `files` en algunos browsers.
    // Procesamos las 2 fuentes y deduplicamos por nombre+size.

    const filesFromExplorer = Array.from(e.clipboardData?.files || []);
    const itemFiles = [];
    for (const item of (e.clipboardData?.items || [])) {
      if (item.kind === 'file') {
        const f = item.getAsFile();
        if (f) itemFiles.push(f);
      }
    }

    // Dedupe por nombre+size (archivos del explorer suelen aparecer en ambos)
    const all = [];
    const seen = new Set();
    for (const f of [...filesFromExplorer, ...itemFiles]) {
      const key = `${f.name}|${f.size}`;
      if (!seen.has(key)) { seen.add(key); all.push(f); }
    }

    if (all.length === 0) return;  // Ctrl+V de texto → comportamiento default

    e.preventDefault();

    // Asignar nombre a screenshots sin nombre ("image.png" genérico de print-screen)
    const named = all.map(f => {
      if (!f.name || f.name === 'image.png' || f.name === 'unnamed') {
        const ext = (f.type.split('/')[1] || 'png').split('+')[0];
        return new File([f], `pegado-${Date.now()}.${ext}`, { type: f.type });
      }
      return f;
    });

    // Reusar el handler unificado de file input — hace todo: split por tipo,
    // límite de adjuntos, upload de docs, ingest de imágenes.
    handleAnyFileChange({ target: { files: named, value: '' } });

    const imgCount = named.filter(f => f.type?.startsWith('image/')).length;
    const docCount = named.length - imgCount;
    if (imgCount && docCount) {
      setToast(`📋 ${imgCount} imagen${imgCount > 1 ? 'es' : ''} + ${docCount} documento${docCount > 1 ? 's' : ''} pegado${named.length > 1 ? 's' : ''}`);
    } else if (imgCount) {
      setToast(`📋 ${imgCount} imagen${imgCount > 1 ? 'es' : ''} pegada${imgCount > 1 ? 's' : ''} del portapapeles`);
    } else {
      setToast(`📋 ${docCount} documento${docCount > 1 ? 's' : ''} pegado${docCount > 1 ? 's' : ''} del portapapeles`);
    }
  }

  function toggleVoice() {
    if (recording) { recogRef.current?.stop(); setRecording(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const r = new SR(); r.lang = 'es'; r.continuous = false; r.interimResults = false;
    r.onresult = e => { const t = e.results[0][0].transcript; setInput(p => p ? p + ' ' + t : t); };
    r.onerror = () => setRecording(false); r.onend = () => setRecording(false);
    recogRef.current = r; r.start(); setRecording(true);
  }

  function openAdmin() {
    if (adminToken) setAdminState('panel');
    else setAdminState('login');
  }

  async function reloadStock() {
    try {
      const r = await fetch('/api/reload-stock', { method: 'POST', headers: { Authorization: `Bearer ${token}` } });
      if (r.status === 401) { onLogout(); return; }
      setToast((await r.json()).message || 'Catálogo recargado');
    } catch { setToast('Error al recargar el catálogo'); }
  }

  function stopGeneration() {
    if (abortRef.current) {
      try { abortRef.current.abort(); } catch {}
    }
  }

  // ─── Core de streaming ─────────────────────────────────────────────
  // Recibe un array de mensajes YA armado (con el último user incluido) y
  // dispara el stream SSE contra /api/chat/stream. Es la pieza compartida
  // entre sendMessage (turno nuevo), regenerateLast (rehacer última) y
  // editMessage (editar user + rehacer). Mantenerlo "puro" — no toca
  // `input`, `pendingImgs`, `pendingDocs`: eso es responsabilidad del wrapper.
  async function streamFromMessages(messagesToSend, currentId, docContext) {
    setLoading(true);
    setThinkingSteps([]);
    setActiveModel(null);
    setReasoningText('');

    let streamedText = '';
    let assistantAdded = false;
    let reasoningBuf = '';
    let wasTruncated = false;  // BUG-FIX v1.4.1: marcar si el modelo cortó por MAX_TOKENS

    const controller = new AbortController();
    abortRef.current = controller;

    try {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
        body: JSON.stringify({ messages: messagesToSend, system_context: docContext, agent_id: currentAgentId }),
        signal: controller.signal,
      });
      if (res.status === 401) { onLogout(); return; }
      if (!res.ok) {
        const d = await res.json().catch(() => ({}));
        const err = [...messagesToSend, { role: 'assistant', content: `⚠️ Error: ${d.detail || 'Error inesperado.'}` }];
        setMessages(err); persistMessages(currentId, err); return;
      }

      await readSSE(res, (evt) => {
        if (evt.type === 'model_selected') {
          setActiveModel({ model: evt.model, source: evt.source });
        } else if (evt.type === 'thinking') {
          setThinkingSteps(prev => {
            const i = prev.findIndex(s => s.tool === evt.tool && s.query === evt.query);
            if (i >= 0) { const u = [...prev]; u[i] = evt; return u; }
            return [...prev, evt];
          });
        } else if (evt.type === 'reasoning') {
          // Razonamiento del modelo (Gemini "thoughts"). Aparece en vivo
          // durante la generación y se muestra en bloque colapsible.
          reasoningBuf += evt.text || '';
          setReasoningText(reasoningBuf);
        } else if (evt.type === 'text') {
          streamedText += evt.text;
          if (!assistantAdded) {
            assistantAdded = true;
            setMessages([...messagesToSend, { role: 'assistant', content: streamedText, streaming: true }]);
          } else {
            setMessages(prev => {
              const updated = [...prev];
              const last = updated[updated.length - 1];
              if (last && last.role === 'assistant') {
                updated[updated.length - 1] = { ...last, content: streamedText, streaming: true };
              }
              return updated;
            });
          }
        } else if (evt.type === 'truncated') {
          // El modelo cortó por MAX_TOKENS — marcar el message para que
          // el frontend muestre el botón "Continuar generación".
          wasTruncated = true;
        } else if (evt.type === 'done') {
          // FEATURE v1.5.0: persistir los thoughts del modelo (reasoning)
          // junto con el message para que el usuario los pueda revisar
          // después en un bloque colapsible. Cap a 30K chars por message
          // para no inflar el localStorage en sesiones largas.
          const REASONING_CAP = 30_000;
          let savedReasoning = reasoningBuf.trim();
          if (savedReasoning.length > REASONING_CAP) {
            savedReasoning = savedReasoning.slice(0, REASONING_CAP) +
              `\n\n[...truncado en ${REASONING_CAP.toLocaleString()} caracteres]`;
          }
          const final = [...messagesToSend, {
            role: 'assistant',
            content: streamedText || '(Sin respuesta del modelo)',
            truncated: wasTruncated,
            reasoning: savedReasoning || undefined,  // Solo si hubo thoughts
          }];
          setMessages(final); persistMessages(currentId, final);
        } else if (evt.type === 'error') {
          const err = [...messagesToSend, { role: 'assistant', content: `⚠️ Error: ${evt.message}` }];
          setMessages(err); persistMessages(currentId, err);
        }
      });
    } catch (e) {
      // AbortError = el usuario hizo click en "detener" → no es un error,
      // solo conservamos lo que se haya generado hasta ese momento.
      if (e && (e.name === 'AbortError' || controller.signal.aborted)) {
        const stoppedContent = streamedText
          ? streamedText + '\n\n_⏹ Generación detenida por el usuario._'
          : '_⏹ Generación detenida por el usuario._';
        const stopped = [...messagesToSend, { role: 'assistant', content: stoppedContent }];
        setMessages(stopped); persistMessages(currentId, stopped);
      } else {
        const err = [...messagesToSend, { role: 'assistant', content: '⚠️ No se pudo conectar.' }];
        setMessages(err); persistMessages(currentId, err);
      }
    } finally {
      abortRef.current = null;
      setLoading(false); setThinkingSteps([]); setReasoningText(''); textareaRef.current?.focus();
    }
  }

  // Regenerar la última respuesta del agente. A diferencia de la versión
  // vieja, MANTIENE el user message visible (sin parpadeo): solo se quita
  // la respuesta del asistente y se vuelve a streamear desde el mismo user.
  async function regenerateLast() {
    if (loading) return;
    let lastUserIdx = -1;
    for (let i = messages.length - 1; i >= 0; i--) {
      if (messages[i].role === 'user') { lastUserIdx = i; break; }
    }
    if (lastUserIdx === -1) return;
    // Reset feedback de los mensajes assistant que se van a borrar
    const newFb = {};
    Object.entries(feedback).forEach(([k, v]) => { if (Number(k) <= lastUserIdx) newFb[k] = v; });
    setFeedback(newFb);
    // INCLUIR el user message (slice +1) — así no parpadea
    const kept = messages.slice(0, lastUserIdx + 1);
    setMessages(kept);
    const currentId = activeId || genId();
    if (!activeId) setActiveId(currentId);
    await streamFromMessages(kept, currentId, buildDocContext());
  }

  // BUG-FIX v1.4.1: continuar una respuesta truncada (cortada por MAX_TOKENS).
  // A diferencia de regenerateLast (que rehace todo el último turno), esta
  // función AGREGA un user message sintético "continuá" y deja que el modelo
  // siga desde donde quedó. La respuesta nueva se appendea como otro
  // assistant message — al usuario le queda un flujo continuo.
  async function continueGeneration() {
    if (loading) return;
    if (messages.length === 0) return;
    const last = messages[messages.length - 1];
    if (last.role !== 'assistant') return;  // solo si el último es del asistente
    // Limpiamos el flag truncated del último para que el botón desaparezca
    // (si la continuación queda también truncada, el nuevo message lo tendrá).
    const withoutFlag = messages.map((m, i) =>
      i === messages.length - 1 ? { ...m, truncated: false } : m
    );
    // Agregar user message sintético + lanzar stream
    const messagesToSend = [
      ...withoutFlag,
      { role: 'user', content: 'continuá' },
    ];
    setMessages(messagesToSend);
    const currentId = activeId || genId();
    if (!activeId) setActiveId(currentId);
    await streamFromMessages(messagesToSend, currentId, buildDocContext());
  }

  // Editar un mensaje del usuario (estilo Gemini): reemplaza el texto,
  // preserva las imágenes que tenía adjuntas, trunca todo lo posterior y
  // re-streamea desde ese punto.
  async function editMessage(idx, newText) {
    if (loading) return;
    if (idx < 0 || idx >= messages.length) return;
    const orig = messages[idx];
    if (orig.role !== 'user') return;
    const cleaned = (newText || '').trim();
    if (!cleaned && (typeof orig.content === 'string' || !orig.content.some(b => b.type === 'image'))) {
      // Si quedó vacío y no hay imágenes que justifiquen el mensaje → cancelar
      setEditingMessageIdx(null); setEditDraft(''); return;
    }
    // Construir nuevo content: si el original tenía imágenes, preservarlas
    let newContent;
    if (typeof orig.content === 'string') {
      newContent = cleaned;
    } else {
      const imgs = orig.content.filter(b => b.type === 'image');
      if (imgs.length) {
        newContent = cleaned
          ? [...imgs, { type: 'text', text: cleaned }]
          : imgs;
      } else {
        newContent = cleaned;
      }
    }
    // Truncar todo lo que viene después del índice editado y reemplazar el user
    const kept = [...messages.slice(0, idx), { role: 'user', content: newContent }];
    // Reset feedback de mensajes posteriores
    const newFb = {};
    Object.entries(feedback).forEach(([k, v]) => { if (Number(k) < idx) newFb[k] = v; });
    setFeedback(newFb);
    setMessages(kept);
    setEditingMessageIdx(null);
    setEditDraft('');
    const currentId = activeId || genId();
    if (!activeId) setActiveId(currentId);
    await streamFromMessages(kept, currentId, buildDocContext());
  }

  // Wrapper: arma el mensaje del user desde el composer (input + adjuntos)
  // y dispara el stream. Esta es la API pública usada por el botón Enviar.
  async function sendMessage(text) {
    text = (text || input).trim();
    if ((!text && !pendingImgs.length && !pendingDocs.length) || loading) return;
    // Indicar visualmente al usuario qué documentos van adjuntos en este turno
    const docNote = pendingDocs.length
      ? `\n\n📎 Adjunto: ${pendingDocs.map(d => d.filename).join(', ')}`
      : '';
    const visibleText = text + docNote;

    // Armar content: si hay imágenes, content es array con N images + texto.
    // Si no hay imágenes, content es string plano (compat con el formato actual).
    let content;
    if (pendingImgs.length) {
      const imgBlocks = pendingImgs.map(img => ({
        type: 'image',
        source: { type: 'base64', media_type: img.mediaType, data: img.data },
      }));
      content = visibleText
        ? [...imgBlocks, { type: 'text', text: visibleText }]
        : imgBlocks;
    } else {
      content = visibleText;
    }

    const docContext = buildDocContext();
    const newMessages = [...messages, { role: 'user', content }];
    const currentId = activeId || genId();
    if (!activeId) setActiveId(currentId);
    setMessages(newMessages); setInput(''); setPendingImgs([]); setPendingDocs([]);
    await streamFromMessages(newMessages, currentId, docContext);
  }

  const _q = sidebarQuery.trim().toLowerCase();
  // Filtrar conversaciones por agente activo. Chats viejos sin agentId → asumimos default.
  const _chatsForAgent = currentAgentId
    ? chats.filter(c => (c.agentId || 'fidi') === currentAgentId)
    : chats;
  const filteredChats = _q
    ? _chatsForAgent.filter(c => (c.title || '').toLowerCase().includes(_q))
    : _chatsForAgent;
  const groups = groupByDate([...filteredChats].sort((a, b) => new Date(b.date) - new Date(a.date)));
  const chatTitle = activeId
    ? (chats.find(c => c.id === activeId)?.title || 'Conversación')
    : 'Nueva consulta';

  // ── Exportar conversación como archivo .txt descargable ─────────
  function exportConversation() {
    if (!messages.length) {
      setToast('No hay nada para compartir todavía.');
      return;
    }
    const now = new Date();
    const dateStr = now.toLocaleString('es-UY', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    const userLabel = (username || 'Usuario').toUpperCase();
    const header = [
      '═══════════════════════════════════════════════════════════════',
      '  FIDEMAR · CORTEX',
      `  Conversación: ${chatTitle}`,
      `  Usuario: ${username || '—'}`,
      `  Exportado: ${dateStr}`,
      '═══════════════════════════════════════════════════════════════',
      '',
    ].join('\n');

    // Convertir cada mensaje a texto plano
    const parts = messages.map(m => {
      let body;
      if (typeof m.content === 'string') {
        body = m.content;
      } else if (Array.isArray(m.content)) {
        const text = m.content.find(b => b.type === 'text')?.text || '';
        const hasImg = m.content.some(b => b.type === 'image');
        body = (hasImg ? '[Imagen adjunta]\n' : '') + text;
      } else {
        body = String(m.content || '');
      }
      // Limpiar markdown básico para que se lea como texto plano
      const clean = body
        .replace(/\*\*(.+?)\*\*/g, '$1')           // negritas
        .replace(/\*(.+?)\*/g, '$1')                // itálicas
        .replace(/`(.+?)`/g, '$1')                  // inline code
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1 ($2)')  // links → "texto (url)"
        .replace(/^#{1,6}\s+/gm, '')                // headings
        .replace(/^\s*[-*]\s+/gm, ' • ')            // listas
        .replace(/\n{3,}/g, '\n\n');                // colapsar saltos múltiples
      const who = m.role === 'user' ? userLabel : 'FIDEMAR CORTEX';
      return `[ ${who} ]\n${'─'.repeat(64)}\n${clean.trim()}`;
    });

    const footer = [
      '',
      '═══════════════════════════════════════════════════════════════',
      '  Fin de la conversación',
      '  Generado por Fidemar S.A. — Agente Consultor',
      '═══════════════════════════════════════════════════════════════',
    ].join('\n');

    const text = header + parts.join('\n\n\n') + footer;

    // Crear blob + link descargable
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const safeTitle = (chatTitle || 'conversacion').replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '_').slice(0, 40) || 'conversacion';
    const dateTag   = now.toISOString().slice(0, 10);
    a.href     = url;
    a.download = `fidemar_${dateTag}_${safeTitle}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    setToast('✓ Conversación exportada como .txt');
  }
  const SUGGESTED_PROMPTS = [
    { icon: 'Valve',  cat: 'Búsqueda en catálogo', text: '¿Qué válvulas BERMAD tienen disponibles?' },
    { icon: 'Sensor', cat: 'Sensores',             text: 'Sensores de nivel NIVELCO para tanque de 6m' },
    { icon: 'Wrench', cat: 'Selección',            text: 'Actuador neumático NUTORK para válvula DN150' },
    { icon: 'Book',   cat: 'Normativas',           text: '¿Qué norma aplica para válvulas API 600?' },
    { icon: 'Valve',  cat: 'Comparativa',          text: '¿Diferencia entre válvula de bola y compuerta?' },
    { icon: 'Wrench', cat: 'Recomendación',        text: 'Válvula para fluido corrosivo a 80°C — ¿qué recomendás?' },
  ];

  const userInitials = (username || 'U').slice(0, 2).toUpperCase();

  return (
    <div className="app" data-sidebar={sidebarOpen ? "open" : "collapsed"}>
      {adminState === 'login' && (
        <AdminLoginModal
          onSuccess={tok => { setAdminToken(tok); setAdminState('panel'); }}
          onClose={() => setAdminState(null)}
        />
      )}
      {adminState === 'panel' && adminToken && (
        <AdminPanel adminToken={adminToken} onClose={() => setAdminState(null)} />
      )}
      {toast && <div className="toast">{toast}</div>}

      {/* ── Topbar ─────────────────────────────────────────────── */}
      <header className="topbar">
        <button className="topbar-icon-btn" onClick={() => setSidebarOpen(v => !v)} aria-label="Toggle sidebar">
          <Icon.Menu />
        </button>
        <div className="brand">
          <span className="brand-logo">Fidemar</span>
          <span className="brand-cortex">Cortex</span>
        </div>
        <div className="topbar-spacer" />
        {username && (
          <button className="topbar-user" title={username}>
            <span className="avatar-mini">{userInitials}</span>
            <span>{username}</span>
          </button>
        )}
        <button className="topbar-icon-btn" onClick={onToggleTheme} aria-label={theme === 'dark' ? 'Modo claro' : 'Modo oscuro'} title={theme === 'dark' ? 'Modo claro' : 'Modo oscuro'}>
          {theme === 'dark' ? <Icon.Sun /> : <Icon.Moon />}
        </button>
        <button className="topbar-icon-btn" onClick={openAdmin} aria-label="Panel de administración">
          <Icon.Settings />
        </button>
        <button className="btn-salir" onClick={onLogout}>Salir</button>
      </header>

      {/* ── Sidebar ────────────────────────────────────────────── */}
      <aside className="sidebar">
        <div className="sidebar-top">
          {/* Selector de asistente */}
          {agents.length > 0 && (
            <div className="agent-selector">
              <button
                className="agent-selector-btn"
                onClick={() => setAgentMenuOpen(o => !o)}
                title="Cambiar asistente"
              >
                <AgentIcon iconUrl={currentAgent?.icon_url} emoji={currentAgent?.icon} size={20} />
                <span className="agent-name">{currentAgent?.name || 'Asistente'}</span>
                <span className="agent-chevron">{agentMenuOpen ? '▲' : '▼'}</span>
              </button>
              {agentMenuOpen && (
                <div className="agent-selector-menu">
                  {agents.map(a => (
                    <div
                      key={a.id}
                      className={"agent-option" + (a.id === currentAgentId ? ' active' : '')}
                      onClick={() => switchAgent(a.id)}
                    >
                      <AgentIcon iconUrl={a.icon_url} emoji={a.icon} size={22} />
                      <div className="agent-option-text">
                        <div className="agent-option-name">{a.name}</div>
                        {a.description && <div className="agent-option-desc">{a.description}</div>}
                      </div>
                      {a.id === currentAgentId && <span className="check">✓</span>}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          <button className="new-consult-btn" onClick={startNewChat}>
            <span className="pencil-icon"><Icon.Edit /></span>
            <span>Nueva consulta</span>
          </button>
          <div className="sidebar-search">
            <span className="sidebar-search-icon"><Icon.Search /></span>
            <input
              type="text"
              placeholder="Buscar conversaciones"
              value={sidebarQuery}
              onChange={e => setSidebarQuery(e.target.value)}
            />
          </div>
        </div>
        <nav className="conv-section">
          {Object.keys(groups).length === 0 ? (
            <div className="conv-empty">
              {sidebarQuery ? 'Sin coincidencias' : 'Todavía no hay conversaciones'}
            </div>
          ) : Object.entries(groups).map(([label, group], gi) => (
            <div className="conv-group" key={label}>
              <div className={"conv-group-label" + (gi === 0 ? " first" : "")}>{label}</div>
              {group.map(c => {
                const IconCmp = Icon[pickConvIcon(c.title)] || Icon.Message;
                return (
                  <button
                    key={c.id}
                    className={"conv-item" + (activeId === c.id ? " active" : "")}
                    onClick={() => loadChat(c.id)}
                    title={c.title}
                  >
                    <span className="conv-item-icon"><IconCmp /></span>
                    <span className="conv-item-text">{c.title}</span>
                    <span
                      className="conv-item-delete"
                      onClick={e => { e.stopPropagation(); deleteChat(c.id); }}
                      title="Eliminar conversación"
                    >
                      <Icon.X width="13" height="13" />
                    </span>
                  </button>
                );
              })}
            </div>
          ))}
        </nav>
      </aside>

      {/* Backdrop clickeable solo visible en mobile cuando el sidebar está abierto */}
      <div className="sidebar-backdrop" onClick={() => setSidebarOpen(false)} aria-hidden="true" />

      {/* ── Main ───────────────────────────────────────────────── */}
      <main className="main">
        <div className="chat-header">
          <div className="chat-title">{chatTitle}</div>
          <div className="chat-header-actions">
            <button
              className="icon-btn-ghost"
              title="Exportar conversación como archivo de texto"
              onClick={exportConversation}
              disabled={messages.length === 0}
              style={messages.length === 0 ? { opacity: 0.35, cursor: 'not-allowed' } : undefined}
            >
              <Icon.Share />
            </button>
          </div>
        </div>
        <div className="chat-scroll">
          <div className="chat-inner">
            <div className="messages-area">
            {messages.length === 0 ? (
              <div className="welcome">
                <div className="welcome-mark" style={{ background: 'transparent', border: 'none' }}>
                  {(currentAgent?.icon_url || currentAgent?.icon) ? (
                    <AgentIcon iconUrl={currentAgent?.icon_url} emoji={currentAgent?.icon} size={88} />
                  ) : (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M3 12h4M17 12h4"/><circle cx="12" cy="12" r="5"/><path d="M12 7v-3M12 20v-3"/>
                    </svg>
                  )}
                </div>
                <h1 className="welcome-title">{greeting}</h1>
                {examples.length > 0 && (
                  <div className="welcome-examples">
                    {examples.map((ex, i) => (
                      <button
                        key={i}
                        type="button"
                        className="welcome-example"
                        onClick={() => pickExample(ex)}
                      >
                        <span>{ex}</span>
                        <span className="welcome-example-arrow">→</span>
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ) : (
              <>
                {messages.map((m, i) => {
                  const isLast = i === messages.length - 1;
                  const isStreaming = m.streaming && isLast;
                  const isUser = m.role === 'user';
                  return (
                    <div key={i} className={`message-row ${m.role}`}>
                      <div className="message-block">
                        <div className="message-meta">{isUser ? (username || 'Usuario') : (currentAgent?.name || 'Fidemar Cortex')}</div>
                        {isUser ? (
                          editingMessageIdx === i ? (
                            <form
                              className="msg-edit-form"
                              onSubmit={(e) => { e.preventDefault(); editMessage(i, editDraft); }}
                            >
                              <textarea
                                className="msg-edit-textarea"
                                value={editDraft}
                                autoFocus
                                onChange={(e) => setEditDraft(e.target.value)}
                                onKeyDown={(e) => {
                                  if (e.key === 'Escape') {
                                    e.preventDefault();
                                    setEditingMessageIdx(null);
                                    setEditDraft('');
                                  } else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
                                    e.preventDefault();
                                    editMessage(i, editDraft);
                                  }
                                }}
                              />
                              <div className="msg-edit-actions">
                                <button
                                  type="button"
                                  onClick={() => { setEditingMessageIdx(null); setEditDraft(''); }}
                                >
                                  Cancelar
                                </button>
                                <button type="submit" className="primary" disabled={loading}>
                                  Guardar y regenerar
                                </button>
                              </div>
                            </form>
                          ) : (
                            <div className="user-bubble-wrap">
                              <div className="user-bubble"><UserContent content={m.content} /></div>
                              {!loading && (
                                <button
                                  className="msg-edit-btn"
                                  title="Editar mensaje"
                                  onClick={() => {
                                    const txt = typeof m.content === 'string'
                                      ? m.content
                                      : (m.content.find(b => b.type === 'text')?.text || '');
                                    setEditDraft(txt);
                                    setEditingMessageIdx(i);
                                  }}
                                >
                                  <Icon.Edit width="14" height="14" />
                                </button>
                              )}
                            </div>
                          )
                        ) : (
                          <>
                            <div className="assistant-card">
                              <AssistantMd content={m.content} onProtectedDownload={downloadProtectedFile} />
                              {isStreaming && <span className="streaming-cursor" />}
                            </div>
                            {/* FEATURE v1.5.0: bloque colapsible con los thoughts
                                persistidos. Cerrado por default, abre con click.
                                Sirve para auditar a posteriori cómo razonó el agente. */}
                            {m.reasoning && !isStreaming && (
                              <ThoughtsViewer reasoning={m.reasoning} />
                            )}
                            {/* BUG-FIX v1.4.1: aviso + botón "Continuar" cuando el modelo
                                cortó por MAX_TOKENS. Solo aparece en el último mensaje. */}
                            {m.truncated && isLast && !loading && (
                              <div className="msg-truncated-notice">
                                <span className="msg-truncated-icon">⚠</span>
                                <span className="msg-truncated-text">
                                  La respuesta quedó cortada porque alcanzó el límite de tokens.
                                </span>
                                <button
                                  className="msg-truncated-btn"
                                  onClick={continueGeneration}
                                  title="El modelo continúa desde donde quedó"
                                >
                                  Continuar generación →
                                </button>
                              </div>
                            )}
                            {!isStreaming && !loading && (
                              <div className="msg-actions">
                                {isLast && (
                                  <button className="msg-action-btn" onClick={regenerateLast} title="Regenerar respuesta">
                                    <Icon.Refresh /><span>Regenerar</span>
                                  </button>
                                )}
                                <button
                                  className={"msg-action-btn" + (feedback[i] === 'up' ? ' active' : '')}
                                  onClick={() => setFeedback(p => ({ ...p, [i]: p[i] === 'up' ? null : 'up' }))}
                                  title="Útil"
                                >
                                  <Icon.ThumbUp />
                                </button>
                                <button
                                  className={"msg-action-btn" + (feedback[i] === 'down' ? ' active' : '')}
                                  onClick={() => setFeedback(p => ({ ...p, [i]: p[i] === 'down' ? null : 'down' }))}
                                  title="No útil"
                                >
                                  <Icon.ThumbDown />
                                </button>
                              </div>
                            )}
                          </>
                        )}
                      </div>
                    </div>
                  );
                })}
                {loading && (
                  <WorkingChip
                    steps={thinkingSteps}
                    isStreaming={!!messages[messages.length - 1]?.streaming}
                    activeModel={activeModel}
                  />
                )}
                {loading && thinkingSteps.length > 0 && (
                  <ThinkingIndicator steps={thinkingSteps} loading={loading} />
                )}
                {loading && thinkingSteps.length === 0 && !(messages[messages.length - 1]?.streaming) && (
                  <div className="progress-bar">
                    <span className="progress-bar-label">Procesando consulta</span>
                    <div className="progress-bar-track"><div className="progress-bar-fill" /></div>
                  </div>
                )}
                {loading && reasoningText && (
                  <ReasoningPanel text={reasoningText} />
                )}
                <div ref={bottomRef} />
              </>
            )}
            </div>
          </div>
        </div>

        <div className="composer-wrap">
          {/* Previews de los adjuntos pendientes (imágenes + docs) */}
          {(pendingImgs.length > 0 || pendingDocs.length > 0 || uploadingDoc) && (
            <div className="composer-attachments-row">
              {pendingImgs.map((img, i) => (
                <div key={`img-${i}`} className="composer-attachment-preview">
                  <img src={img.previewUrl} className="composer-attachment-thumb" alt="" />
                  <span className="composer-attachment-name">{img.name}</span>
                  <button className="composer-attachment-remove" onClick={() => removeImg(i)} title="Quitar imagen">
                    <Icon.X width="14" height="14" />
                  </button>
                </div>
              ))}
              {pendingDocs.map((d, i) => (
                <div key={`doc-${i}`} className="composer-attachment-preview">
                  <div className="composer-attachment-doc-icon">📄</div>
                  <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minWidth: 0 }}>
                    <span className="composer-attachment-name">{d.filename}</span>
                    <span style={{ fontSize: 11, color: 'var(--text-3)' }}>{d.char_count.toLocaleString()} caracteres extraídos</span>
                  </div>
                  <button className="composer-attachment-remove" onClick={() => removeDoc(i)} title="Quitar documento">
                    <Icon.X width="14" height="14" />
                  </button>
                </div>
              ))}
              {uploadingDoc && (
                <div className="composer-attachment-preview">
                  <span className="thinking-spinner" />
                  <span className="composer-attachment-name">Procesando documento…</span>
                </div>
              )}
              {(pendingImgs.length + pendingDocs.length) > 0 && (
                <div className="composer-attachments-count">
                  {pendingImgs.length + pendingDocs.length} / {MAX_ATTACHMENTS} adjuntos
                </div>
              )}
            </div>
          )}
          <div className="composer">
            <div className="composer-tools">
              {/* Un solo input acepta imágenes y documentos. El handler
                  dispatch por tipo. Podés seleccionar varios archivos a la vez
                  (Ctrl/Shift en el dialog de selección). */}
              <input
                ref={fileRef}
                type="file"
                accept="image/*,.pdf,.docx,.pptx,.xlsx,.xlsm,.csv,.txt,.md,application/pdf"
                multiple
                style={{ display: 'none' }}
                onChange={handleAnyFileChange}
              />
              <button
                className="composer-icon-btn"
                onClick={() => fileRef.current?.click()}
                disabled={loading || uploadingDoc || attachmentsCount() >= MAX_ATTACHMENTS}
                title={attachmentsCount() >= MAX_ATTACHMENTS
                  ? `Máximo ${MAX_ATTACHMENTS} adjuntos`
                  : 'Adjuntar imágenes o documentos (podés seleccionar varios)'}
              >
                <Icon.Paperclip />
              </button>
            </div>
            <textarea
              ref={textareaRef} rows={1}
              className="composer-input"
              placeholder={pendingImgs.length ? "Agregá una descripción (opcional)…" : "Consultá productos o pegá una imagen con Ctrl+V…"}
              value={input} onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }}
              onPaste={handlePaste}
              disabled={loading}
            />
            {HAS_SPEECH && (
              <div className="composer-tools">
                <button
                  className={`composer-icon-btn${recording ? ' recording' : ''}`}
                  onClick={toggleVoice}
                  disabled={loading}
                  title={recording ? 'Detener dictado' : 'Dictar por voz'}
                >
                  <Icon.Mic />
                </button>
              </div>
            )}
            {loading ? (
              <button
                className="composer-send is-stop"
                onClick={stopGeneration}
                title="Detener generación"
                aria-label="Detener generación"
              >
                <Icon.Stop />
              </button>
            ) : (
              <button
                className="composer-send"
                onClick={() => sendMessage()}
                disabled={!input.trim() && !pendingImgs.length}
                title="Enviar (Enter)"
                aria-label="Enviar mensaje"
              >
                <Icon.ArrowUp />
              </button>
            )}
          </div>
          <div className="composer-hint">
            <span className="composer-hint-text">
              El Cortex es IA y puede cometer errores. Siempre chequeá sus respuestas.
            </span>
            <span className="powered-by">powered by <b>AgentX</b></span>
          </div>
        </div>
      </main>
    </div>
  );
}

function App() {
  const [token, setTokenSt]    = useState(getToken);
  const [username, setUserSt]  = useState(getUsername);
  const [theme, setThemeSt]    = useState(() => localStorage.getItem('fidemar_theme') || 'light');

  // Aplicar tema al documento + persistir
  useEffect(() => {
    if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('fidemar_theme', theme);
  }, [theme]);

  const toggleTheme = () => setThemeSt(t => t === 'dark' ? 'light' : 'dark');

  // BUG-FIX v1.4.1: refresh automático del JWT cada 6h.
  // El token dura 24h (config.jwt_expire_hours), pero el frontend renueva
  // silenciosamente cada 6h para que el usuario NUNCA se desconecte
  // mientras esté la pestaña abierta y la sesión activa. Estilo Gmail.
  // Si el token ya expiró (jornada larga + pestaña cerrada toda la noche),
  // el refresh falla con 401 → onLogout natural.
  //
  // También renovamos el adminToken (si existe en sessionStorage). Sin esto,
  // el admin token también expiraba en 24h y el panel admin se quedaba sin
  // info silenciosamente (era el bug del screenshot del usuario).
  useEffect(() => {
    if (!token) return;
    let cancelled = false;

    async function refreshOne(currentToken, kind) {
      try {
        const r = await fetch('/api/auth/refresh', {
          method: 'POST',
          headers: { Authorization: `Bearer ${currentToken}` },
        });
        if (cancelled) return null;
        if (r.status === 401) return 'expired';
        if (!r.ok) return null;
        const d = await r.json();
        return d?.token || null;
      } catch {
        return null;
      }
    }

    async function doRefresh() {
      if (cancelled) return;
      // 1. Token regular (user)
      const newUser = await refreshOne(token, 'user');
      if (cancelled) return;
      if (newUser === 'expired') {
        clearToken(); clearUsername();
        setTokenSt(null); setUserSt('');
        return;  // Si el regular expiró, no tiene sentido seguir con admin
      } else if (newUser) {
        setTokenSt(newUser);
      }
      // 2. Token admin (si existe en sessionStorage). Es separado del regular.
      const adminTok = getAdminTok();
      if (adminTok) {
        const newAdmin = await refreshOne(adminTok, 'admin');
        if (cancelled) return;
        if (newAdmin === 'expired') {
          // Admin expiró: limpiar para que el próximo click en el icono ⚙️
          // pida re-login admin. NO afecta la sesión user.
          clearAdminTok();
        } else if (newAdmin) {
          setAdminTok(newAdmin);
        }
      }
    }

    // Renovar cada 6h (1/4 del JWT_EXPIRE_HOURS=24)
    const id = setInterval(doRefresh, 6 * 60 * 60 * 1000);
    return () => { cancelled = true; clearInterval(id); };
  }, [token]);

  // Persistir token cuando cambia (login + refresh)
  useEffect(() => {
    if (token) setToken(token);
  }, [token]);

  // UpdateBanner se monta SIEMPRE (también en el login) para que si hay
  // un release nuevo mientras alguien está parado en login, se entere.
  // Como fragment para no introducir un wrapper que rompa el layout.
  if (!token) return (
    <>
      <UpdateBanner />
      <Login onLogin={(t, u) => { setTokenSt(t); setUserSt(u); }} />
    </>
  );
  return (
    <>
      <UpdateBanner />
      <Chat
        token={token}
        username={username}
        theme={theme}
        onToggleTheme={toggleTheme}
        onLogout={() => { clearToken(); clearUsername(); setTokenSt(null); setUserSt(''); }}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<!-- PWA: registrar Service Worker para que la app sea installable -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js', { scope: '/' })
        .then((reg) => {
          // Activar update inmediato si hay una versión nueva esperando
          if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                nw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        })
        .catch((err) => console.warn('SW registration failed:', err));

      // Cuando se activa un SW nuevo, recargar para usar la versión actualizada
      let reloading = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloading) return;
        reloading = true;
        window.location.reload();
      });
    });
  }
</script>
