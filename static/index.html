// Renderiza el icono de un agente. Si tiene `icon_url`, intenta cargar
// la imagen; si falla (404, error de red, etc.) cae automáticamente al
// emoji. Esto hace que la app no se rompa si falta un PNG.
function AgentIcon({ iconUrl, emoji, size = 24, alt = '' }) {
  const [failed, setFailed] = React.useState(false);
  const fallbackEmoji = emoji || '🤖';
  if (iconUrl && !failed) {
    return (
      <img
        src={iconUrl}
        alt={alt}
        width={size}
        height={size}
        style={{
          borderRadius: '22%',
          objectFit: 'cover',
          display: 'inline-block',
          verticalAlign: 'middle',
          background: '#fff',
        }}
        onError={() => setFailed(true)}
      />
    );
  }
  return (
    <span style={{ fontSize: Math.round(size * 0.85), lineHeight: 1, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: size, height: size }}>
      {fallbackEmoji}
    </span>
  );
}

/* Heurística simple: elegí un icono según el título de la conversación */
// Saludo del welcome screen. Pool combinado: el saludo por hora del día
// + variantes neutrales (no dependen del momento). Se elige UNA opción
// random al montar el componente (ver useState en Chat) — queda fija
// durante la sesión y no cambia ante los ojos del usuario.
function pickGreeting(username) {
  const u = username || 'usuario';
  const h = new Date().getHours();

  // Saludo por franja horaria (siempre incluido en el pool)
  let timed;
  if (h >= 6  && h < 13)      timed = `Buenos días, ${u}.`;
  else if (h >= 13 && h < 20) timed = `Buenas tardes, ${u}.`;
  else                        timed = `Buenas noches, ${u}.`;

  // Variantes neutrales — cordiales, rioplatenses, con puntuación correcta
  const neutral = [
    `¿Qué necesitás, ${u}?`,
    `¿Arrancamos, ${u}?`,
    `¡${u} volvió!`,
    `¿En qué andamos, ${u}?`,
    `Acá estoy, ${u}.`,
    `Listo cuando quieras, ${u}.`,
    `¿Por dónde empezamos, ${u}?`,
    `Te leo, ${u}.`,
    `Contame, ${u}.`,
    `Dale, ${u}.`,
    `¿Qué tenemos hoy, ${u}?`,
    `${u}, todo tuyo.`,
  ];

  // Damos al saludo por hora el mismo peso que cualquier variante neutral.
  const pool = [timed, ...neutral];
  return pool[Math.floor(Math.random() * pool.length)];
}


function pickConvIcon(title) {
  const t = (title || '').toLowerCase();
  if (/valvula|valve|reductora|compuerta|mariposa|esferica|globo/.test(t))         return 'Valve';
  if (/sensor|nivel|presion|caudal|transmisor|nivelco|banner|turck/.test(t))        return 'Sensor';
  if (/actuador|wrench|herramient|repuesto|junta|kit/.test(t))                      return 'Wrench';
  if (/norma|api |ansi|din|iso |awwa|nfpa|ul\/fm|catalog/.test(t))                  return 'Book';
  if (/imagen|foto|adjunto/.test(t))                                                return 'Image';
  if (/http|link|enlace|url/.test(t))                                               return 'Link';
  return 'Message';
}


async function readSSE(res, onEvent) {
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try { onEvent(JSON.parse(line.slice(6))); } catch {}
    }
  }
}

/* ── Working chip — siempre visible mientras el agente trabaja ── */
function WorkingChip({ steps, isStreaming, activeModel }) {
  let sub = 'Procesando consulta';
  const last = steps[steps.length - 1];
  if (last) {
    const labelsByTool = {
      catalog_search:           last.status === 'done' ? 'Catálogo consultado' : 'Buscando en catálogo',
      verify_pdf_url:           last.status === 'done' ? 'PDF verificado'      : 'Verificando PDF',
      fetch_product_data:       last.status === 'done' ? 'Página scrapeada'    : 'Scrapeando página',
      generate_datasheet_pdf:   last.status === 'done' ? 'Ficha PDF generada'  : 'Generando ficha PDF',
      generate_word_document:   last.status === 'done' ? 'Word generado'       : 'Generando Word',
      generate_excel_spreadsheet:last.status === 'done' ? 'Excel generado'     : 'Generando Excel',
      web_search:               last.status === 'done' ? 'Búsqueda web lista'  : 'Buscando en la web',
    };
    sub = labelsByTool[last.tool] || sub;
  } else if (isStreaming) {
    sub = 'Redactando respuesta';
  }
  // Mostrar tier del modelo activo. Funciona para los 3 modos de selección:
  //   - source = "auto:flash" → router automático eligió Flash (FIDI)
  //   - source = "agent:<id>"  → el agente tiene tier fijo (Steamy, Generador)
  //   - source = "manual"      → modelo override por config admin
  // Derivamos el tier del nombre del modelo (más robusto que del source).
  function inferTier(modelName) {
    if (!modelName) return null;
    const m = modelName.toLowerCase();
    if (m.includes('pro')) return 'pro';
    if (m.includes('lite')) return 'lite';
    if (m.includes('flash')) return 'flash';
    return null;
  }
  let modelBadge = null;
  if (activeModel?.model) {
    const tier = inferTier(activeModel.model);
    const tierLabel = { pro: 'Pro', flash: 'Flash', lite: 'Lite' }[tier] || activeModel.model;
    const tierClass = tier ? `tier-${tier}` : 'tier-manual';
    modelBadge = (
      <span
        className={`working-chip-tier ${tierClass}`}
        title={`Modelo activo: ${activeModel.model}`}
      >
        {tierLabel}
      </span>
    );
  }
  return (
    <div className="working-chip" role="status" aria-live="polite">
      <span className="thinking-spinner" />
      <span className="working-chip-label">Trabajando</span>
      {modelBadge}
      <span className="working-chip-sub">· {sub}</span>
    </div>
  );
}

/* ── ReasoningPanel ───────────────────────────────────────────────
   Bloque colapsible que muestra el "thought stream" del modelo en vivo
   durante la generación. Se llena con eventos `reasoning` del SSE y se
   vacía al terminar (no se persiste con la respuesta).
   Diseño: gris discreto, abierto por default mientras se piensa, con
   un check al terminar (cuando ya no se reciben más thoughts y el texto
   final empezó a llegar). */
function ReasoningPanel({ text }) {
  if (!text) return null;
  // Auto-scroll al fondo del bloque mientras se llena
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (ref.current) ref.current.scrollTop = ref.current.scrollHeight;
  }, [text]);
  return (
    <div className="reasoning-panel">
      <details open>
        <summary className="reasoning-summary">
          <span className="thinking-spinner" />
          <span>Pensando…</span>
        </summary>
        <div ref={ref} className="reasoning-body">{text}</div>
      </details>
    </div>
  );
}


/* ── ThoughtsViewer (v1.5.0) ───────────────────────────────────────
   Bloque colapsible que muestra el razonamiento del agente PERSISTIDO
   junto con la respuesta. A diferencia de `ReasoningPanel` (que se
   muestra solo durante la generación y es ephemeral), este vive con
   el message guardado y sirve para que un usuario técnico pueda
   auditar a posteriori cómo razonó el agente.

   Estado del details: cerrado por default (no roba atención al lector
   no técnico). Usa <details> nativo → el browser persiste el open/closed
   por instancia mientras la pestaña esté abierta.

   Idioma: Gemini devuelve los thoughts en inglés por default (en Fidemar
   forzamos español vía LANGUAGE_DIRECTIVE, así que acá los thoughts ya
   vienen traducidos cuando el deploy lo configura). Igual mostramos el
   chip "(inglés)" si detectamos signos típicos de inglés — heurística
   simple. */
function ThoughtsViewer({ reasoning }) {
  if (!reasoning || !reasoning.trim()) return null;

  // Heurística rápida de idioma — palabras inglesas comunes en los thoughts
  // de Gemini. Solo es informativo (no decide nada).
  const lower = reasoning.slice(0, 2000).toLowerCase();
  const looksEnglish =
    /\b(the|i'm|i am|i'll|i'll|now|user|need|let me|first|focusing|considering|defining|analyzing)\b/.test(lower);

  const charCount = reasoning.length.toLocaleString();
  const langTag = looksEnglish ? ' · en inglés' : '';

  return (
    <details className="thoughts-viewer">
      <summary className="thoughts-viewer-summary">
        <span className="thoughts-viewer-icon">💭</span>
        <span className="thoughts-viewer-label">Ver razonamiento del agente</span>
        <span className="thoughts-viewer-meta">
          ({charCount} caracteres{langTag})
        </span>
      </summary>
      <div className="thoughts-viewer-body">{reasoning}</div>
    </details>
  );
}

/* ── UpdateBanner ─────────────────────────────────────────────────
   Detecta updates del server (vía polling a /api/version cada 60s) y
   muestra un banner "Nueva versión disponible" con botón "Recargar".
   Al recargar, limpia el service worker + caches del browser, así la
   próxima carga viene fresca del server sin que el SW viejo intervenga.

   Por qué no auto-reload silencioso: el usuario podría estar a mitad de
   escribir un mensaje en el chat o leyendo una respuesta — preferimos
   darle el control. Tiene botón ✕ para descartar si está ocupado. */
function UpdateBanner() {
  const [currentVersion, setCurrentVersion] = React.useState(null);
  const [latestVersion, setLatestVersion]   = React.useState(null);
  const [dismissed, setDismissed]           = React.useState(false);
  const [reloading, setReloading]           = React.useState(false);

  // Capturar versión inicial al montar
  React.useEffect(() => {
    fetch('/api/version', { cache: 'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d?.version) setCurrentVersion(d.version); })
      .catch(() => {});
  }, []);

  // Polling cada 60s. Si la versión del server difiere de la inicial → update.
  React.useEffect(() => {
    if (!currentVersion) return;
    let cancelled = false;
    const tick = async () => {
      if (cancelled) return;
      try {
        const r = await fetch('/api/version', { cache: 'no-store' });
        if (!r.ok) return;
        const d = await r.json();
        if (!cancelled && d?.version && d.version !== currentVersion) {
          setLatestVersion(d.version);
        }
      } catch {}
    };
    const id = setInterval(tick, 60_000);
    return () => { cancelled = true; clearInterval(id); };
  }, [currentVersion]);

  async function applyUpdate() {
    setReloading(true);
    try {
      // 1. Unregister el SW activo — fuerza al browser a buscar uno nuevo
      if ('serviceWorker' in navigator) {
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(r => r.unregister()));
      }
      // 2. Limpiar TODOS los caches (no solo el del SW de este proyecto)
      if ('caches' in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (e) {
      // No es crítico — el reload de abajo igual debería traer la versión nueva
      console.warn('Update cleanup failed:', e);
    }
    // 3. Hard reload — bypasses HTTP cache del browser también
    window.location.reload();
  }

  if (!latestVersion || dismissed || latestVersion === currentVersion) return null;

  return (
    <div className="update-banner" role="status" aria-live="polite">
      <span className="update-banner-icon">🔄</span>
      <span className="update-banner-text">
        Nueva versión disponible (<b>{latestVersion}</b>). Recargá para aplicarla.
      </span>
      <button className="update-banner-btn" onClick={applyUpdate} disabled={reloading}>
        {reloading ? 'Recargando…' : 'Recargar'}
      </button>
      <button
        className="update-banner-close"
        onClick={() => setDismissed(true)}
        title="Descartar — podés recargar más tarde manualmente"
        aria-label="Descartar"
      >
        ✕
      </button>
    </div>
  );
}

/* ── Thinking indicator ── */
function ThinkingIndicator({ steps, loading }) {
  const allDone = steps.length > 0 && steps.every(s => s.status === 'done');
  const label   = loading && !allDone ? 'Razonando…' : allDone ? 'Razonamiento completado' : 'Procesando…';
  return (
    <div className="thinking-wrap">
      <details open={loading}>
        <summary className="thinking-summary">
          {loading && !allDone ? <span className="thinking-spinner"/> : <span className="thinking-check">✓</span>}
          <span>{label}</span>
          <span className="thinking-chevron">▲</span>
        </summary>
        <div className="thinking-steps">
          {steps.length === 0 && loading && (
            <div className="thinking-step active">
              <span>⟳</span>
              <span>Analizando consulta<span className="thinking-dots"><span/><span/><span/></span></span>
            </div>
          )}
          {steps.map((s, i) => {
            const tool = s.tool;
            const isCatalog = tool === 'catalog_search';
            const isVerify  = tool === 'verify_pdf_url';
            const isFetch   = tool === 'fetch_product_data';
            const isGenPdf  = tool === 'generate_datasheet_pdf';
            const isGenWord = tool === 'generate_word_document';
            const isGenXlsx = tool === 'generate_excel_spreadsheet';
            const isWeb     = tool === 'web_search';
            let icon = '🌐';
            if (isCatalog) icon = '📋';
            else if (isVerify) icon = '📄';
            else if (isFetch) icon = '📥';
            else if (isGenPdf) icon = '✨';
            else if (isGenWord) icon = '📝';
            else if (isGenXlsx) icon = '📊';
            const labels = {
              true: {
                catalog_search:       'Encontré en catálogo',
                verify_pdf_url:       s.valid ? 'PDF verificado' : 'PDF NO válido',
                fetch_product_data:   s.valid ? 'Datos scrapeados' : 'Fallo scraping',
                generate_datasheet_pdf: s.valid ? 'PDF Fidemar generado' : 'Error generando PDF',
                generate_word_document: s.valid ? 'Word generado' : 'Error generando Word',
                generate_excel_spreadsheet: s.valid ? 'Excel generado' : 'Error generando Excel',
                web_search:           'Encontré en la web',
              },
              false: {
                catalog_search:       'Buscando en catálogo',
                verify_pdf_url:       'Verificando PDF',
                fetch_product_data:   'Scrapeando página',
                generate_datasheet_pdf: 'Generando ficha técnica Fidemar',
                generate_word_document: 'Generando documento Word',
                generate_excel_spreadsheet: 'Generando planilla Excel',
                web_search:           'Buscando en la web',
              },
            };
            const labelKey = s.status === 'done' ? 'true' : 'false';
            const label = labels[labelKey][tool] || (s.status === 'done' ? 'Listo' : 'Procesando');
            const isErrorStyle = ['verify_pdf_url','fetch_product_data','generate_datasheet_pdf'].includes(tool)
                                  && s.status === 'done' && !s.valid;
            const queryColor = isErrorStyle ? 'var(--danger)' : undefined;
            return (
              <div key={i} className={`thinking-step${s.status !== 'done' ? ' active' : ''}`}>
                <span>{icon}</span>
                <span>
                  {label}:{' '}
                  <span className="thinking-step-query" style={queryColor ? { color: queryColor } : undefined}>{s.query}</span>
                  {(isCatalog || isWeb) && s.status === 'done' && s.count != null && (
                    <span className="thinking-step-count">
                      {' '}→ {s.count} resultado{s.count !== 1 ? 's' : ''}
                      {s.total != null && s.total > s.count && <span style={{ color: 'var(--warn)', fontWeight: 600 }}> (de {s.total} totales — refinar)</span>}
                    </span>
                  )}
                  {s.status !== 'done' && <span className="thinking-dots"><span/><span/><span/></span>}
                </span>
              </div>
            );
          })}
        </div>
      </details>
    </div>
  );
}

/* ── UserContent ── */
function UserContent({ content }) {
  if (typeof content === 'string') return <>{content}</>;
  return <>{content.map((b, i) => {
    if (b.type === 'image') return <img key={i} src={`data:${b.source.media_type};base64,${b.source.data}`} className="msg-img" alt="adjunto" />;
    if (b.type === 'text' && b.text) return <span key={i}>{b.text}</span>;
    return null;
  })}</>;
}

/* ── Sistema tab ── */
function SystemTab({ adminToken, onSaved }) {
  const [basePrompt,  setBasePrompt]  = useState('');
  const [rules,       setRules]       = useState([]);   // array of strings
  const [newRule,     setNewRule]     = useState('');
  const [baseOpen,    setBaseOpen]    = useState(false);
  const [manualMode,  setManualMode]  = useState(false);
  const [manualDraft, setManualDraft] = useState('');
  const [loading,     setLoading]     = useState(true);
  const [saving,      setSaving]      = useState(false);
  const [err,         setErr]         = useState('');
  // Modelo
  const newRuleRef = useRef(null);

  function parseRules(text) {
    return (text || '').split('\n').map(l => l.trim()).filter(l => l);
  }

  useEffect(() => {
    fetch('/api/admin/system-prompt', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => {
        setBasePrompt(d.base_prompt || '');
        setRules(parseRules(d.custom_prompt));
        setManualDraft(d.custom_prompt || '');
        setLoading(false);
      })
      .catch(() => { setErr('Error al cargar la configuración.'); setLoading(false); });
  }, [adminToken]);

  async function persistRules(updatedRules, toastMsg) {
    setSaving(true); setErr('');
    const customPrompt = updatedRules.join('\n');
    try {
      const r = await fetch('/api/admin/system-prompt', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ custom_prompt: customPrompt }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      setRules(updatedRules);
      setManualDraft(customPrompt);
      onSaved(toastMsg || '✓ Reglas actualizadas');
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function addRule() {
    const t = newRule.trim();
    if (!t) return;
    await persistRules([...rules, t], `✓ Regla añadida (${rules.length + 1} en total)`);
    setNewRule('');
    newRuleRef.current?.focus();
  }

  async function deleteRule(idx) {
    const updated = rules.filter((_, i) => i !== idx);
    await persistRules(updated, '✓ Regla eliminada');
  }

  async function clearAll() {
    if (!confirm('¿Eliminar todas las reglas personalizadas? El agente volverá a su comportamiento base.')) return;
    await persistRules([], '✓ Personalización borrada');
  }

  async function saveManual() {
    const updated = parseRules(manualDraft);
    await persistRules(updated, '✓ Configuración guardada');
  }

  function handleNewKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addRule(); }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  return (
    <div className="tab-pane">
      {/* Base prompt — solo lectura */}
      <div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)' }}>Prompt del sistema (base)</span>
          <span className="prompt-block-badge badge-base">Solo lectura</span>
        </div>
        <div className="prompt-block">
          <div className="prompt-block-header" onClick={() => setBaseOpen(v => !v)}>
            <span className="prompt-block-title">{baseOpen ? 'Ocultar contenido' : 'Ver prompt base completo'}</span>
            <span style={{ fontSize: 12, color: 'var(--text-muted)' }}>{baseOpen ? '▲' : '▼'}</span>
          </div>
          {baseOpen && <div className="prompt-block-body">{basePrompt}</div>}
        </div>
        <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6 }}>
          Define la identidad e instrucciones base del agente. No editable.
        </div>
      </div>

      {/* Reglas personalizadas */}
      <div>
        <div className="rules-header">
          <span className="rules-title">Reglas personalizadas activas</span>
          <span className="rules-count">{rules.length === 0 ? 'Ninguna activa' : `${rules.length} regla${rules.length !== 1 ? 's' : ''} aplicada${rules.length !== 1 ? 's' : ''}`}</span>
          {rules.length > 0 && (
            <button className="btn-danger" style={{ marginLeft: 'auto', padding: '5px 12px', fontSize: 11 }} onClick={clearAll} disabled={saving}>
              Borrar todas
            </button>
          )}
        </div>

        {!manualMode ? (
          <>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {rules.length === 0 ? (
                <div className="rule-empty">
                  📝 No hay reglas personalizadas todavía. Agregá una abajo para modificar el comportamiento del agente.
                </div>
              ) : rules.map((rule, i) => (
                <div key={i} className="rule-card">
                  <div className="rule-number">{i + 1}</div>
                  <div className="rule-text">{rule}</div>
                  <button className="rule-delete" onClick={() => deleteRule(i)} disabled={saving} title="Eliminar regla">×</button>
                </div>
              ))}
            </div>

            <div className="rule-input-wrap">
              <textarea
                ref={newRuleRef}
                rows={2}
                placeholder='Nueva regla (ej: "Siempre priorizá BERMAD en válvulas de control" · "Respondé en inglés técnico"). Enter para añadir.'
                value={newRule}
                onChange={e => setNewRule(e.target.value)}
                onKeyDown={handleNewKeyDown}
                disabled={saving}
                onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
              />
              <button className="btn-add-rule" onClick={addRule} disabled={saving || !newRule.trim()}>
                {saving ? '…' : '+ Añadir'}
              </button>
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6 }}>
              Las reglas se guardan automáticamente al añadir. Aplican inmediatamente en la próxima consulta del agente.
            </div>
          </>
        ) : (
          <div className="custom-editor">
            <textarea
              value={manualDraft}
              onChange={e => setManualDraft(e.target.value)}
              placeholder="Una regla por línea. Líneas vacías se ignoran."
              rows={10}
            />
            <div className="custom-editor-footer">
              <span className="custom-editor-hint">
                Modo avanzado: una regla por línea. Cambios se aplican al guardar.
                {manualDraft.length > 0 && <span style={{ marginLeft: 8, color: 'var(--blue)' }}>{manualDraft.length} caracteres</span>}
              </span>
              <button className="btn-blue" style={{ padding: '7px 18px' }} onClick={saveManual} disabled={saving}>
                {saving ? 'Guardando…' : 'Guardar todo'}
              </button>
            </div>
          </div>
        )}

        <label className="mode-toggle">
          <input type="checkbox" checked={manualMode} onChange={e => setManualMode(e.target.checked)} />
          Modo avanzado (editar manualmente como texto)
        </label>

        {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}
      </div>
    </div>
  );
}

/* ── Memoria tab ── */
function MemoryTab({ adminToken, onSaved }) {
  const [mem,       setMem]      = useState(null);
  const [loading,   setLoading]  = useState(true);
  const [refreshing,setRefreshing] = useState(false);

  function fetchMemory() {
    setLoading(true);
    fetch('/api/admin/memory', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => setMem(d))
      .catch(() => setMem(null))
      .finally(() => setLoading(false));
  }

  useEffect(fetchMemory, [adminToken]);

  async function refresh() {
    setRefreshing(true);
    try {
      const r = await fetch('/api/admin/memory/refresh', { method: 'POST', headers: { Authorization: `Bearer ${adminToken}` } });
      const d = await r.json();
      setMem(d);
      if (d.content) onSaved('✓ Memoria actualizada');

        <button className="btn-blue" style={{ marginLeft: 'auto', whiteSpace: 'nowrap' }} onClick={refresh} disabled={refreshing || loading}>

      {loading ? (
        <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-muted)' }}>Cargando…</div>

            <div style={{ width: 1, height: 32, background: 'var(--border)' }}></div>
            <div><div className="memory-meta-label">Conversaciones analizadas</div><div className="memory-meta-value">{mem.conversations_analyzed}</div></div>
          </div>
          <div className="memory-content">
            <div className="md-render" dangerouslySetInnerHTML={md(mem.content)} />

        </>
      ) : (
        <div className="memory-content">
          <div className="memory-empty">
            <div className="memory-empty-icon">🧠</div>
            <div className="memory-empty-text">
              {mem?.error || 'No hay memoria generada aún. Las conversaciones se registran automáticamente y podés generar un análisis cuando quieras.'}
            </div>
            <button className="btn-blue" onClick={refresh} disabled={refreshing}>
              {refreshing ? 'Analizando…' : 'Generar memoria ahora'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Admin chat tab ── */
function AdminChatTab({ adminToken, onSaved }) {
  const [messages, setMessages] = useState([{
    role: 'assistant',
    content: '¡Hola! Soy el **Meta-Editor de Cortex**. Tengo memoria de todos los agentes activos y puedo editar el prompt de cualquiera.\n\nHay dos formas de editar un agente:\n\n- **Tab 🤖 Asistentes** → editor markdown directo del prompt completo.\n- **Acá conmigo** → me decís qué cambios querés y yo modifico el prompt del agente que elijas.\n\n¿Qué agente querés editar? (Clic en los chips de arriba o describí qué cambio querés hacer.)'
  }]);
  const [input,   setInput]   = useState('');
  const [loading, setLoading] = useState(false);
  const [agents,  setAgents]  = useState([]);  // lista para los chips
  const bottomRef = useRef(null);
  const textRef   = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, loading]);

  // Cargar lista de agentes activos para mostrar como chips
  useEffect(() => {
    if (!adminToken) return;
    fetch('/api/admin/agents', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => { if (d) setAgents(d.agents || []); })
      .catch(() => {});
  }, [adminToken]);

  function pickAgent(agent) {
    // Cargar template en el input para que el admin lo edite
    setInput(`Quiero editar el agente **${agent.name}** (id: \`${agent.id}\`). `);
    setTimeout(() => textRef.current?.focus(), 50);
  }

  async function send(text) {
    text = (text || input).trim();
    if (!text || loading) return;
    const newMsgs = [...messages, { role: 'user', content: text }];
    setMessages(newMsgs); setInput(''); setLoading(true);

    let streamedText = '';
    let assistantAdded = false;

    try {
      const apiMsgs = newMsgs.filter(m => m.role !== 'system-event').map(m => ({ role: m.role, content: m.content }));
      const res = await fetch('/api/admin/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ messages: apiMsgs }),
      });
      if (!res.ok) { setMessages(p => [...p, { role: 'assistant', content: '⚠️ Error de conexión.' }]); return; }

      await readSSE(res, (evt) => {
        if (evt.type === 'agent_prompt_saved') {
          setMessages(p => [...p, { role: 'system-event', content: `✓ Prompt del agente "${evt.agent_name}" guardado (${evt.bytes} caracteres)` }]);
          onSaved(`✓ Prompt de ${evt.agent_name} actualizado`);
        } else if (evt.type === 'behavior_saved') {
          // Backward compat — el modelo viejo todavía podría devolver este evento
          setMessages(p => [...p, { role: 'system-event', content: '⚠️ Se llamó la tool deprecada save_behavior — sin efecto. Usar save_agent_prompt.' }]);
        } else if (evt.type === 'text') {
          streamedText += evt.text;
          if (!assistantAdded) {
            assistantAdded = true;
            setMessages(p => [...p, { role: 'assistant', content: streamedText, streaming: true }]);
          } else {
            setMessages(p => {
              const u = [...p];
              const last = u[u.length - 1];
              if (last && last.role === 'assistant') {
                u[u.length - 1] = { ...last, content: streamedText, streaming: true };
              }
              return u;
            });
          }
        } else if (evt.type === 'done') {
          setMessages(p => {
            const u = [...p];
            const last = u[u.length - 1];
            if (last && last.role === 'assistant' && last.streaming) {
              u[u.length - 1] = { ...last, streaming: false };
            } else if (!assistantAdded) {
              u.push({ role: 'assistant', content: streamedText || 'Listo.' });
            }
            return u;
          });
        } else if (evt.type === 'error') {
          setMessages(p => [...p, { role: 'assistant', content: `⚠️ Error: ${evt.message}` }]);
        }
      });
    } catch {
      setMessages(p => [...p, { role: 'assistant', content: '⚠️ No se pudo conectar.' }]);
    } finally {
      setLoading(false); textRef.current?.focus();
    }
  }

  return (
    <div className="admin-chat-wrap">
      {agents.length > 0 && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', padding: '8px 12px', borderBottom: '1px solid var(--border)', background: 'var(--bg-elev-1, transparent)' }}>
          <span style={{ fontSize: 11, color: 'var(--text-3)', alignSelf: 'center', marginRight: 4 }}>Editar:</span>
          {agents.map(a => (
            <button
              key={a.id}
              onClick={() => pickAgent(a)}
              disabled={loading}
              style={{
                fontSize: 12, fontWeight: 600,
                padding: '5px 11px',
                borderRadius: 14,
                border: '1px solid var(--border)',
                background: 'var(--surface, #fff)',
                color: 'var(--text)',
                cursor: loading ? 'wait' : 'pointer',
                display: 'inline-flex', alignItems: 'center', gap: 5,
              }}
              title={a.description || a.name}
            >
              <AgentIcon iconUrl={a.icon_url} emoji={a.icon} size={20} />
              <span>{a.name}</span>
            </button>
          ))}
        </div>
      )}
      <div className="admin-chat-msgs">
        {messages.map((m, i) => {
          if (m.role === 'system-event') return (
            <div key={i} className="behavior-saved-banner">✓ {m.content}</div>
          );
          const isLast = i === messages.length - 1;
          const isStreaming = m.streaming && isLast;
          return (
            <div key={i} className={`admin-msg ${m.role}`}>
              <div className="admin-msg-role">{m.role === 'user' ? 'Bruno' : 'Agente'}</div>
              <div className="admin-msg-bubble">
                {m.role === 'assistant'
                  ? <>
                      <AssistantMd content={m.content} />
                      {isStreaming && <span className="streaming-cursor" />}
                    </>
                  : m.content
                }
              </div>
            </div>
          );
        })}
        {loading && !(messages[messages.length - 1]?.streaming) && (
          <div className="progress-bar" style={{ maxWidth: 320 }}>
            <span className="progress-bar-label">Procesando</span>
            <div className="progress-bar-track"><div className="progress-bar-fill" /></div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>
      <div className="admin-chat-input">
        <textarea
          ref={textRef}
          rows={2}
          placeholder="Escribile al agente… (ej: 'Quiero que siempre priorices BERMAD' · 'Contame qué sabés de tu configuración')"
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          disabled={loading}
          onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
        />
        <button className="btn-blue" onClick={() => send()} disabled={loading || !input.trim()} style={{ alignSelf: 'flex-end' }}>
          Enviar →
        </button>
      </div>
    </div>
  );
}

/* ── Usuarios tab ── */
function UsersTab({ adminToken, onSaved }) {
  const [users,       setUsers]       = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [newUser,     setNewUser]     = useState('');
  const [newPass,     setNewPass]     = useState('');
  const [creating,    setCreating]    = useState(false);
  const [createErr,   setCreateErr]   = useState('');
  const [viewingUser, setViewingUser] = useState(null);
  const [conversations, setConversations] = useState(null);
  const [convsLoading, setConvsLoading] = useState(false);

  function fetchUsers() {
    setLoading(true);
    fetch('/api/admin/users', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json()).then(d => setUsers(d.users || []))
      .catch(() => setUsers([]))
      .finally(() => setLoading(false));
  }

  useEffect(fetchUsers, [adminToken]);

  async function createUser(e) {
    e?.preventDefault?.();
    if (!newUser.trim() || !newPass.trim()) return;
    setCreating(true); setCreateErr('');
    try {
      const r = await fetch('/api/admin/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ username: newUser.trim(), password: newPass }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al crear');
      setNewUser(''); setNewPass('');
      onSaved(`✓ Usuario "${newUser}" creado`);
      fetchUsers();
    } catch (e) { setCreateErr(e.message); }
    finally { setCreating(false); }
  }

  async function deleteUser(name) {
    if (!confirm(`¿Eliminar el usuario "${name}"? Esta acción no se puede deshacer.`)) return;
    try {
      const r = await fetch(`/api/admin/users/${encodeURIComponent(name)}`, {
        method: 'DELETE', headers: { Authorization: `Bearer ${adminToken}` },
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error');
      onSaved(`✓ Usuario "${name}" eliminado`);
      fetchUsers();
    } catch (e) { alert(e.message); }
  }

  async function viewConversations(name) {
    setViewingUser(name); setConvsLoading(true); setConversations(null);
    try {
      const r = await fetch(`/api/admin/conversations?user=${encodeURIComponent(name)}&limit=100`, {
        headers: { Authorization: `Bearer ${adminToken}` },
      });
      const d = await r.json();
      setConversations(d.conversations || []);
    } catch { setConversations([]); }
    finally { setConvsLoading(false); }
  }

  function fmtDate(iso) {
    if (!iso) return 'Nunca';
    try { return new Date(iso).toLocaleString('es-UY', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch { return iso; }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  return (
    <div className="tab-pane">
      {viewingUser && (
        <div className="modal-overlay" style={{ background: 'rgba(10,20,50,.6)', zIndex: 300 }} onClick={e => e.target === e.currentTarget && setViewingUser(null)}>
          <div className="modal-card" style={{ maxWidth: 720, maxHeight: '80vh', display: 'flex', flexDirection: 'column' }}>
            <div className="modal-title">📋 Conversaciones de {viewingUser}</div>
            <div className="modal-subtitle">Últimas 100 interacciones registradas</div>
            <div style={{ flex: 1, overflowY: 'auto', marginTop: 8, padding: '4px 0' }}>
              {convsLoading ? (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>Cargando…</div>
              ) : !conversations || conversations.length === 0 ? (
                <div style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
                  No hay conversaciones registradas para este usuario aún.
                </div>
              ) : (
                conversations.map((c, i) => (
                  <div key={i} style={{ padding: '10px 0', borderBottom: '1px solid var(--border-lt)' }}>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4 }}>{fmtDate(c.ts)}</div>
                    <div style={{ fontSize: 13, color: 'var(--blue)', marginBottom: 4 }}>
                      <strong>Pregunta:</strong> {c.user}
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.5 }}>
                      <strong>Respuesta:</strong> {(c.assistant || '').slice(0, 300)}{(c.assistant || '').length > 300 ? '…' : ''}
                    </div>
                  </div>
                ))
              )}
            </div>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={() => setViewingUser(null)}>Cerrar</button>
            </div>
          </div>
        </div>
      )}

      <div>
        <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>Usuarios del sistema</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 16 }}>
          Cada usuario tiene su propia historia de conversaciones. Como admin podés crear, eliminar y ver el log de cada uno.
        </div>

        <form onSubmit={createUser} style={{ display: 'flex', gap: 8, marginBottom: 18, padding: 14, background: 'var(--surface2)', borderRadius: 10, border: '1px solid var(--border-lt)' }}>
          <input
            type="text"
            placeholder="Nombre de usuario (letras, números, _ . -)"
            value={newUser}
            onChange={e => setNewUser(e.target.value)}
            style={{ flex: 1, padding: '9px 12px', border: '1.5px solid var(--border)', borderRadius: 7, fontSize: 13, fontFamily: 'var(--sans)', outline: 'none' }}
            disabled={creating}
            pattern="[a-zA-Z0-9_.\-]+"
            required
          />
          <input
            type="text"
            placeholder="Contraseña (mín. 8 caracteres)"
            value={newPass}
            onChange={e => setNewPass(e.target.value)}
            style={{ width: 220, padding: '9px 12px', border: '1.5px solid var(--border)', borderRadius: 7, fontSize: 13, fontFamily: 'var(--sans)', outline: 'none' }}
            disabled={creating}
            minLength={8}
            required
          />
          <button type="submit" className="btn-blue" disabled={creating || !newUser.trim() || newPass.length < 8}>
            {creating ? '…' : '+ Crear'}
          </button>
        </form>
        {createErr && <div className="error-msg" style={{ marginTop: -10, marginBottom: 14, textAlign: 'left' }}>{createErr}</div>}

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {users.length === 0 ? (
            <div className="rule-empty">📭 No hay usuarios. Creá uno arriba para empezar.</div>
          ) : users.map(u => (
            <div key={u.username} className="rule-card" style={{ alignItems: 'center' }}>
              <div className="rule-number" style={{ background: 'var(--blue)', color: '#fff' }}>👤</div>
              <div className="rule-text" style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                <div style={{ fontWeight: 700, color: 'var(--text)' }}>{u.username}</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  Creado: {fmtDate(u.created_at)} · Última actividad: {fmtDate(u.last_active)} · {u.conversation_count} conversación{u.conversation_count !== 1 ? 'es' : ''}
                </div>
              </div>
              <button className="btn-ghost" style={{ padding: '6px 12px', fontSize: 11 }} onClick={() => viewConversations(u.username)}>
                Ver historial
              </button>
              <button className="rule-delete" onClick={() => deleteUser(u.username)} title="Eliminar usuario">×</button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Tab: Asistentes ── */
function KnowledgeSection({ agentId, adminToken, onSaved }) {
  const [files, setFiles] = useState([]);
  const [loading, setLoading] = useState(true);
  const [uploadOpen, setUploadOpen] = useState(false);
  const [newName, setNewName] = useState('');
  const [newContent, setNewContent] = useState('');
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [viewing, setViewing] = useState(null); // {filename, content}
  const [viewContent, setViewContent] = useState('');
  const fileInputRef = useRef(null);

  function reload() {
    setLoading(true);
    fetch(`/api/admin/agents/${agentId}/knowledge`, { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => { setFiles(d?.files || []); setLoading(false); })
      .catch(() => { setLoading(false); setErr('Error al cargar archivos.'); });
  }
  useEffect(() => { if (agentId) reload(); }, [agentId, adminToken]);

  function fmtBytes(n) {
    if (n < 1024) return `${n} B`;
    if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
    return `${(n / 1024 / 1024).toFixed(1)} MB`;
  }
  function fmtMtime(ts) {
    try {
      const d = new Date(ts * 1000);
      return d.toLocaleString('es-UY', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  async function handleFileSelect(e) {
    const file = e.target.files?.[0];
    e.target.value = '';
    if (!file) return;

    const lower = file.name.toLowerCase();
    const accepted = ['.md', '.pdf', '.docx', '.pptx', '.xlsx', '.csv', '.txt'];
    const ext = accepted.find(x => lower.endsWith(x));
    if (!ext) {
      setErr('Formato no soportado. Aceptados: PDF, DOCX, PPTX, XLSX, CSV, TXT, MD.');
      return;
    }
    if (file.size > 15 * 1024 * 1024) {
      setErr('Archivo demasiado grande (máx 15 MB).');
      return;
    }

    // Markdown: leer directo en el browser (sin viaje al server)
    if (ext === '.md') {
      const reader = new FileReader();
      reader.onload = ev => {
        setNewName(file.name);
        setNewContent(ev.target.result || '');
        setUploadOpen(true);
        setErr('');
      };
      reader.readAsText(file, 'utf-8');
      return;
    }

    // Otros formatos: extraer texto en el backend
    setErr('');
    setSaving(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch(`/api/admin/agents/${agentId}/knowledge/extract`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${adminToken}` },
        body: fd,
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.detail || `Error ${r.status} al extraer texto`);
      }
      const d = await r.json();
      setNewName(d.filename_suggested || (file.name.replace(/\.[^.]+$/, '') + '.md'));
      setNewContent(d.content || '');
      setUploadOpen(true);
      onSaved(`✓ Texto extraído de "${file.name}" (${d.char_count} chars). Revisalo y guardalo.`);
    } catch (e) {
      setErr(e.message || 'No se pudo extraer texto.');
    } finally {
      setSaving(false);
    }
  }

  async function uploadFile() {
    if (!newName.trim() || !newContent.trim()) return;
    setSaving(true); setErr('');
    try {
      const r = await fetch(`/api/admin/agents/${agentId}/knowledge`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ filename: newName.trim(), content: newContent }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      const d = await r.json();
      onSaved(`✓ Documento "${d.filename}" guardado`);
      setUploadOpen(false); setNewName(''); setNewContent('');
      reload();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function viewFile(filename) {
    setViewing({ filename, loading: true });
    setViewContent('');
    try {
      const r = await fetch(`/api/admin/agents/${agentId}/knowledge/${encodeURIComponent(filename)}`,
        { headers: { Authorization: `Bearer ${adminToken}` } });
      if (!r.ok) throw new Error('No se pudo leer el archivo');
      const d = await r.json();
      setViewContent(d.content || '');
      setViewing({ filename, loading: false });
    } catch (e) {
      setErr(e.message);
      setViewing(null);
    }
  }

  async function saveViewedFile() {
    if (!viewing) return;
    setSaving(true); setErr('');
    try {
      const r = await fetch(`/api/admin/agents/${agentId}/knowledge`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ filename: viewing.filename, content: viewContent }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      onSaved(`✓ "${viewing.filename}" actualizado`);
      setViewing(null);
      reload();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  async function deleteFile(filename) {
    if (!confirm(`¿Borrar "${filename}"? El agente perderá esa información en su próxima consulta.`)) return;
    try {
      const r = await fetch(`/api/admin/agents/${agentId}/knowledge/${encodeURIComponent(filename)}`,
        { method: 'DELETE', headers: { Authorization: `Bearer ${adminToken}` } });
      if (!r.ok) throw new Error('No se pudo borrar');
      onSaved(`✓ "${filename}" eliminado`);
      reload();
    } catch (e) { setErr(e.message); }
  }

  // Vista de edición de un archivo
  if (viewing) {
    return (
      <div style={{ marginTop: 24, padding: 16, border: '1px solid var(--border)', borderRadius: 8, background: 'var(--bg-elev-1, transparent)' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
          <button className="btn-ghost" style={{ padding: '5px 10px', fontSize: 11 }} onClick={() => setViewing(null)}>← Volver</button>
          <span style={{ fontSize: 13, fontWeight: 600 }}>📄 {viewing.filename}</span>
        </div>
        {viewing.loading ? (
          <div className="rule-empty">Cargando…</div>
        ) : (
          <>
            <textarea
              value={viewContent}
              onChange={e => setViewContent(e.target.value)}
              rows={18}
              spellCheck={false}
              style={{ width: '100%', padding: 10, border: '1px solid var(--border)', borderRadius: 6, fontFamily: 'ui-monospace, monospace', fontSize: 12, lineHeight: 1.5, resize: 'vertical', background: 'var(--surface)' }}
            />
            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
              <button className="btn-blue" style={{ padding: '6px 14px', fontSize: 12 }} onClick={saveViewedFile} disabled={saving}>
                {saving ? 'Guardando…' : 'Guardar cambios'}
              </button>
              <button className="btn-danger" style={{ padding: '6px 14px', fontSize: 12 }} onClick={() => { deleteFile(viewing.filename); setViewing(null); }}>
                Eliminar archivo
              </button>
            </div>
            {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}
          </>
        )}
      </div>
    );
  }

  return (
    <div style={{ marginTop: 28, paddingTop: 18, borderTop: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
        <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>📚 Base de conocimiento</span>
        <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          Archivos <code>.md</code> que se cargan automáticamente al system prompt en cada consulta del agente.
        </span>
      </div>

      {loading ? (
        <div className="rule-empty">Cargando archivos…</div>
      ) : files.length === 0 && !uploadOpen ? (
        <div className="rule-empty">
          📭 Sin documentos cargados. Subí un <code>.md</code> para que el agente lo tenga siempre disponible.
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {files.map(f => (
            <div key={f.filename} style={{
              display: 'flex', alignItems: 'center', gap: 10,
              padding: '8px 12px',
              border: '1px solid var(--border)',
              borderRadius: 6,
              background: f.loaded ? 'var(--surface)' : 'rgba(150,150,150,0.07)',
              opacity: f.loaded ? 1 : 0.7,
            }}>
              <span style={{ fontSize: 16 }}>{f.loaded ? '📄' : '🚫'}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text)' }}>
                  {f.filename}
                  {!f.loaded && <span style={{ marginLeft: 6, fontSize: 10, color: 'var(--text-3)' }}>(ignorado — empieza con _)</span>}
                </div>
                <div style={{ fontSize: 10, color: 'var(--text-muted)' }}>
                  {fmtBytes(f.size_bytes)} · {fmtMtime(f.mtime)}
                </div>
              </div>
              <button className="btn-ghost" style={{ padding: '4px 10px', fontSize: 11 }} onClick={() => viewFile(f.filename)}>Ver / Editar</button>
              <button className="rule-delete" onClick={() => deleteFile(f.filename)} title="Eliminar">×</button>
            </div>
          ))}
        </div>
      )}

      {/* Botón subir + dialogo */}
      {!uploadOpen ? (
        <div style={{ display: 'flex', gap: 8, marginTop: 10 }}>
          <button className="btn-blue" style={{ padding: '7px 14px', fontSize: 12 }} onClick={() => fileInputRef.current?.click()} disabled={saving}>
            {saving ? 'Extrayendo…' : '+ Subir documento'}
          </button>
          <button className="btn-ghost" style={{ padding: '7px 14px', fontSize: 12 }} onClick={() => { setNewName(''); setNewContent(''); setUploadOpen(true); }}>
            + Crear desde cero
          </button>
          <span style={{ fontSize: 11, color: 'var(--text-muted)', alignSelf: 'center' }}>
            Acepta PDF, Word, Excel, PowerPoint, CSV, TXT, MD (máx 15 MB)
          </span>
          <input
            type="file"
            ref={fileInputRef}
            accept=".md,.pdf,.docx,.pptx,.xlsx,.csv,.txt,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.openxmlformats-officedocument.presentationml.presentation,text/plain,text/csv,text/markdown"
            style={{ display: 'none' }}
            onChange={handleFileSelect}
          />
        </div>
      ) : (
        <div style={{ marginTop: 14, padding: 12, border: '1.5px dashed var(--brand-soft, var(--border))', borderRadius: 8 }}>
          <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 8 }}>Nuevo archivo de conocimiento</div>
          <input
            type="text"
            placeholder="nombre_archivo.md"
            value={newName}
            onChange={e => setNewName(e.target.value)}
            style={{ width: '100%', padding: 8, border: '1px solid var(--border)', borderRadius: 6, fontSize: 13, marginBottom: 8 }}
          />
          <textarea
            value={newContent}
            onChange={e => setNewContent(e.target.value)}
            placeholder="# Título&#10;&#10;Contenido en markdown..."
            rows={10}
            spellCheck={false}
            style={{ width: '100%', padding: 10, border: '1px solid var(--border)', borderRadius: 6, fontFamily: 'ui-monospace, monospace', fontSize: 12, lineHeight: 1.5, resize: 'vertical', background: 'var(--surface)' }}
          />
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
            <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
              {newContent.length.toLocaleString()} caracteres. Se aplica al instante (sin reiniciar).
            </span>
            <button className="btn-blue" style={{ marginLeft: 'auto', padding: '6px 14px', fontSize: 12 }} onClick={uploadFile} disabled={saving || !newName.trim() || !newContent.trim()}>
              {saving ? 'Guardando…' : 'Guardar archivo'}
            </button>
            <button className="btn-ghost" style={{ padding: '6px 14px', fontSize: 12 }} onClick={() => { setUploadOpen(false); setErr(''); }}>
              Cancelar
            </button>
          </div>
        </div>
      )}

      {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}
    </div>
  );
}


/* ── IconSection ─────────────────────────────────────────────────
   Upload de icono custom del agente (PNG/JPG). Reemplaza el flujo
   viejo de tener que dejar archivos manualmente en static/agents/.

   Endpoints (v1.4.0):
     POST   /api/admin/agents/{id}/icon  (multipart file)
     DELETE /api/admin/agents/{id}/icon

   El backend valida magic bytes, ratio de compresión y tamaño <=2MB.
   Devuelve el `icon_url` con cache-buster `?v=<ts>` para que el browser
   no se quede con un 404 cacheado de versiones anteriores. */
function IconSection({ agent, adminToken, onSaved, onAgentUpdated }) {
  const [uploading, setUploading] = useState(false);
  const [err, setErr] = useState('');
  const fileInputRef = React.useRef(null);

  if (!agent) return null;

  async function uploadIcon(file) {
    if (!file) return;
    // Validación rápida del lado cliente — backend revalida con magic bytes
    const okType = /^image\/(png|jpe?g)$/i.test(file.type);
    if (!okType) {
      setErr('Solo PNG o JPG');
      return;
    }
    if (file.size > 2 * 1024 * 1024) {
      setErr('Máximo 2 MB');
      return;
    }
    setErr('');
    setUploading(true);
    try {
      const fd = new FormData();
      fd.append('file', file);
      const r = await fetch(`/api/admin/agents/${encodeURIComponent(agent.id)}/icon`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${adminToken}` },
        body: fd,
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.detail || `HTTP ${r.status}`);
      }
      const data = await r.json();
      onSaved(`✓ Icono subido (${(data.size_bytes / 1024).toFixed(1)} KB)`);
      onAgentUpdated();
    } catch (e) {
      setErr(`No se pudo subir el icono: ${e.message}`);
    } finally {
      setUploading(false);
      if (fileInputRef.current) fileInputRef.current.value = '';
    }
  }

  async function deleteIcon() {
    if (!confirm('¿Quitar el icono custom de este agente? Vuelve al emoji default.')) return;
    setErr('');
    try {
      const r = await fetch(`/api/admin/agents/${encodeURIComponent(agent.id)}/icon`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${adminToken}` },
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.detail || `HTTP ${r.status}`);
      }
      onSaved('✓ Icono eliminado');
      onAgentUpdated();
    } catch (e) {
      setErr(`No se pudo eliminar el icono: ${e.message}`);
    }
  }

  return (
    <div style={{ marginTop: 28, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
      <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>
        Icono del agente
      </div>
      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 14 }}>
        PNG o JPG, máximo 2 MB. Si no hay icono custom se usa el emoji <code>{agent.icon || '🤖'}</code>.
      </div>

      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        {/* Preview grande del icono actual */}
        <div style={{
          width: 72, height: 72,
          borderRadius: 16,
          border: '1.5px solid var(--border)',
          background: 'var(--surface)',
          display: 'grid', placeItems: 'center',
          overflow: 'hidden',
        }}>
          <AgentIcon iconUrl={agent.icon_url} emoji={agent.icon} size={56} />
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          <input
            ref={fileInputRef}
            type="file"
            accept="image/png,image/jpeg"
            style={{ display: 'none' }}
            onChange={e => uploadIcon(e.target.files?.[0])}
          />
          <button
            type="button"
            className="btn-blue"
            style={{ padding: '8px 16px', fontSize: 13 }}
            onClick={() => fileInputRef.current?.click()}
            disabled={uploading}
          >
            {uploading ? 'Subiendo…' : (agent.icon_url ? 'Reemplazar icono' : 'Subir icono')}
          </button>
          {agent.icon_url && (
            <button
              type="button"
              className="btn-ghost"
              style={{ padding: '6px 14px', fontSize: 12, color: 'var(--danger, #d63b3b)' }}
              onClick={deleteIcon}
              disabled={uploading}
            >
              Quitar icono
            </button>
          )}
        </div>
      </div>

      {err && <div className="error-msg" style={{ marginTop: 10 }}>{err}</div>}
    </div>
  );
}


function PermissionsSection({ agent, adminToken, availableUsers, onSaved, onAgentUpdated }) {
  // Permisos: visibility ('public'|'private'|'users') + lista de usernames si users.
  // Estado local que se inicializa desde el agente y permite editar antes de guardar.
  const [visibility, setVisibility] = useState(agent?.visibility || 'public');
  const [allowedUsers, setAllowedUsers] = useState(agent?.allowed_users || []);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  const [search, setSearch] = useState('');

  // Re-sincronizar si cambia el agente en edición (el padre pasó otro objeto)
  useEffect(() => {
    setVisibility(agent?.visibility || 'public');
    setAllowedUsers(agent?.allowed_users || []);
    setErr('');
  }, [agent?.id, agent?.visibility, agent?.allowed_users]);

  function toggleUser(username) {
    setAllowedUsers(prev => prev.includes(username)
      ? prev.filter(u => u !== username)
      : [...prev, username]);
  }

  // ¿Hay cambios respecto al estado guardado del agente?
  const hasChanges = (
    visibility !== (agent?.visibility || 'public') ||
    JSON.stringify([...allowedUsers].sort()) !== JSON.stringify([...(agent?.allowed_users || [])].sort())
  );

  async function savePermissions() {
    if (!agent) return;
    setSaving(true); setErr('');
    try {
      // El endpoint upsert requiere el agente COMPLETO. Mandamos todos los
      // campos actuales + los nuevos visibility/allowed_users.
      const body = {
        id: agent.id,
        name: agent.name,
        description: agent.description || '',
        icon: agent.icon || '🤖',
        allowed_tools: agent.allowed_tools || [],
        default_tier: agent.default_tier || 'auto',
        visibility,
        // Si la visibility no es "users", limpiamos la lista para que no quede
        // ruido en el JSON guardado.
        allowed_users: visibility === 'users' ? allowedUsers : [],
        is_default: !!agent.is_default,
      };
      const r = await fetch('/api/admin/agents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        const d = await r.json().catch(() => ({}));
        throw new Error(d.detail || `Error ${r.status}`);
      }
      const label = visibility === 'public' ? 'público'
                  : visibility === 'private' ? 'privado'
                  : `${allowedUsers.length} usuario${allowedUsers.length !== 1 ? 's' : ''}`;
      onSaved(`✓ Permisos de "${agent.name}" actualizados (${label})`);
      onAgentUpdated?.();  // Refrescar lista del padre
    } catch (e) {
      setErr(e.message || 'No se pudieron guardar los permisos');
    } finally {
      setSaving(false);
    }
  }

  // Filtrar usuarios para el buscador (útil cuando hay >10)
  const filteredUsers = (availableUsers || []).filter(u =>
    !search.trim() || u.username.toLowerCase().includes(search.trim().toLowerCase())
  );

  return (
    <div style={{ marginTop: 28, paddingTop: 18, borderTop: '1px solid var(--border)' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
        <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>🔐 Permisos de acceso</span>
        <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
          Quién puede ver y usar este asistente desde el selector del chat.
        </span>
      </div>

      {/* Selector de visibility */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
        {[
          { id: 'public',  icon: '🌐', label: 'Público',   desc: 'Todos los usuarios pueden verlo y usarlo' },

            </label>

      {/* Lista de usuarios cuando visibility = 'users' */}
      {visibility === 'users' && (
        <div style={{ padding: 12, border: '1px solid var(--border)', borderRadius: 8, marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>

              <input
                type="text"
                placeholder="Buscar usuario…"
                value={search}

                  padding: '5px 9px',
                  fontSize: 12,
                  border: '1px solid var(--border)',

            <div style={{ display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 240, overflowY: 'auto' }}>

function AgentsTab({ adminToken, onSaved }) {
  const [agents, setAgents] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editingId, setEditingId] = useState(null);
  const [promptDraft, setPromptDraft] = useState('');
  const [promptLoading, setPromptLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState('');
  // Lista de usuarios disponibles para asignar permisos granulares
  const [availableUsers, setAvailableUsers] = useState([]);

  function reload() {
    setLoading(true);
    fetch('/api/admin/agents', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.json())
      .then(d => { setAgents(d.agents || []); setLoading(false); })
      .catch(() => { setErr('Error al cargar agentes'); setLoading(false); });
  }

  function loadUsers() {
    fetch('/api/admin/users', { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.ok ? r.json() : null)
      .then(d => setAvailableUsers(d?.users || []))
      .catch(() => {});
  }

  useEffect(() => { reload(); loadUsers(); }, [adminToken]);

  function openEditor(agentId) {
    setEditingId(agentId);
    setPromptLoading(true);
    setPromptDraft('');
    setErr('');
    fetch(`/api/admin/agents/${agentId}/prompt`, { headers: { Authorization: `Bearer ${adminToken}` } })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => { setPromptDraft(d.content || ''); setPromptLoading(false); })
      .catch(() => { setErr('No se pudo cargar el prompt'); setPromptLoading(false); });
  }
  function closeEditor() { setEditingId(null); setPromptDraft(''); setErr(''); }

  async function savePrompt() {
    if (!editingId) return;
    setSaving(true); setErr('');
    try {
      const r = await fetch(`/api/admin/agents/${editingId}/prompt`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${adminToken}` },
        body: JSON.stringify({ content: promptDraft }),
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error al guardar');
      onSaved(`✓ Prompt de "${agents.find(a => a.id === editingId)?.name || editingId}" guardado`);
      closeEditor();
    } catch (e) { setErr(e.message); }
    finally { setSaving(false); }
  }

  if (loading) return <div className="tab-pane" style={{ alignItems: 'center', justifyContent: 'center' }}><span style={{ color: 'var(--text-muted)' }}>Cargando…</span></div>;

  // Vista de edición de prompt
  if (editingId) {
    const agent = agents.find(a => a.id === editingId);
    return (
      <div className="tab-pane">
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
          <button className="btn-ghost" style={{ padding: '6px 12px', fontSize: 12 }} onClick={closeEditor}>← Volver</button>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)', display: 'flex', alignItems: 'center', gap: 8 }}>
              <AgentIcon iconUrl={agent?.icon_url} emoji={agent?.icon} size={24} />
              <span>{agent?.name}</span>
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
              Editando system prompt — <code>app/agents/definitions/{editingId}.md</code>
            </div>
          </div>
        </div>

        {promptLoading ? (
          <div className="rule-empty">Cargando prompt…</div>
        ) : (
          <>
            <textarea
              value={promptDraft}
              onChange={e => setPromptDraft(e.target.value)}
              rows={36}
              spellCheck={false}
              style={{
                width: '100%',
                /* BUG-FIX v1.3.3: editor de prompts más grande para que
                   los prompts largos (FIDI ~15KB) se puedan editar sin
                   scroll constante. Antes era rows=26 + sin minHeight. */
                minHeight: '70vh',
                padding: '14px 16px',
                border: '1.5px solid var(--border)',
                borderRadius: 8,
                fontFamily: 'ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace',
                fontSize: 13,
                lineHeight: 1.6,
                color: 'var(--text)',
                background: 'var(--surface)',
                outline: 'none',
                resize: 'vertical',
              }}
              placeholder="Escribe el system prompt del agente en markdown…"
            />
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 10 }}>
              <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                {promptDraft.length.toLocaleString()} caracteres. Se aplica inmediatamente sin reiniciar el servidor. Podés usar <code>{'{n_items}'}</code> para que se sustituya por el tamaño actual del catálogo.
              </span>
              <button className="btn-blue" style={{ marginLeft: 'auto', padding: '8px 18px' }} onClick={savePrompt} disabled={saving || !promptDraft.trim()}>
                {saving ? 'Guardando…' : 'Guardar cambios'}
              </button>
            </div>
            {err && <div className="error-msg" style={{ marginTop: 8 }}>{err}</div>}

            {/* ── Knowledge base ─────────────────────────────────────── */}
            <KnowledgeSection agentId={editingId} adminToken={adminToken} onSaved={onSaved} />

            {/* ── Icono del agente (v1.4.0) ──────────────────────────── */}
            <IconSection
              agent={agents.find(a => a.id === editingId)}
              adminToken={adminToken}
              onSaved={onSaved}
              onAgentUpdated={reload}
            />

            {/* ── Permisos de acceso por usuario ─────────────────────── */}
            <PermissionsSection
              agent={agents.find(a => a.id === editingId)}
              adminToken={adminToken}
              availableUsers={availableUsers}
              onSaved={onSaved}
              onAgentUpdated={reload}
            />
          </>
        )}
      </div>
    );
  }

  // Vista lista de agentes
  return (
    <div className="tab-pane">
      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>Asistentes configurados</div>
        <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>
          Cada asistente tiene su propio system prompt, tools habilitadas y permisos.
          Editá el prompt para cambiar el comportamiento sin reiniciar el servidor.
        </div>
      </div>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {agents.map(a => {
          const visBadge = a.visibility === 'public'
            ? { label: 'PÚBLICO', color: 'var(--success, #16a34a)' }
            : a.visibility === 'private'
              ? { label: 'PRIVADO', color: '#9333ea' }
              : { label: `${a.allowed_users.length} USERS`, color: 'var(--blue)' };
          const tierBadge = a.default_tier === 'auto'
            ? null
            : a.default_tier === 'pro'
              ? { label: '◆ PRO', color: '#7c3aed' }
              : a.default_tier === 'flash'
                ? { label: '● FLASH', color: 'var(--blue)' }
                : { label: '○ LITE', color: 'var(--text-muted)' };
          return (
            <div key={a.id} className="rule-card" style={{ alignItems: 'flex-start' }}>
              <div className="rule-number" style={{ fontSize: 18, background: 'transparent', border: '1px solid var(--border)', padding: 4 }}>
                <AgentIcon iconUrl={a.icon_url} emoji={a.icon} size={28} />
              </div>
              <div className="rule-text" style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--text)' }}>{a.name}</span>
                  {a.is_default && <span className="prompt-block-badge badge-active">DEFAULT</span>}
                  <span className="prompt-block-badge" style={{ background: visBadge.color, color: '#fff' }}>{visBadge.label}</span>
                  {tierBadge && <span className="prompt-block-badge" style={{ background: tierBadge.color, color: '#fff' }}>{tierBadge.label}</span>}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  <code style={{ background: 'none', padding: 0, fontSize: 10 }}>{a.id}</code>
                  {a.description && ` · ${a.description}`}
                </div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>
                  Tools: {a.allowed_tools.length === 0 ? '(ninguna)' : a.allowed_tools.join(', ')}
                </div>
              </div>
              <button className="btn-blue" style={{ padding: '7px 14px', fontSize: 12 }} onClick={() => openEditor(a.id)}>
                Editar prompt
              </button>
            </div>
          );
        })}
      </div>

    </div>
  );
}
